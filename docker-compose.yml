services:
  postgres:
    image: postgres:16-alpine
    logging: &default-logging
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facturacion_simple}
      POSTGRES_USER: ${POSTGRES_USER:-facturacion_simple}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-facturacion_simple}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - facturacion_simple_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://facturacion_simple:facturacion_simple@postgres:5432/facturacion_simple}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:8092}
      BACKOFFICE_ORIGIN: ${BACKOFFICE_ORIGIN:-http://localhost:8092}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${API_HTTP_PORT:-8091}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgres://facturacion_simple:facturacion_simple@postgres:5432/facturacion_simple}
    command: ["node", "apps/api/dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_HTTP_PORT:-8092}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 20

volumes:
  facturacion_simple_pg:
