services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: facturacion_simple
      POSTGRES_USER: facturacion_simple
      POSTGRES_PASSWORD: facturacion_simple
    ports:
      - "5433:5432"
    volumes:
      - facturacion_simple_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facturacion_simple -d facturacion_simple"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://facturacion_simple:facturacion_simple@postgres:5432/facturacion_simple
      APP_ORIGIN: http://localhost:8090
      BACKOFFICE_ORIGIN: http://localhost:8090
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8091:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://facturacion_simple:facturacion_simple@postgres:5432/facturacion_simple
    command: ["node", "apps/api/dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8090:80"

volumes:
  facturacion_simple_pg:
