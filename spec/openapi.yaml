openapi: 3.0.3
info:
  title: Facturacion Simple Cliente SaaS API
  version: 0.1.0
  description: |
    API propia del SaaS Facturacion Simple Cliente.

    Este contrato cubre la aplicacion operativa mobile-first y el backoffice interno minimo.
    La autoridad fiscal sigue siendo `facturacion-electronica` Ventax.

    Reglas base:
    - El operador emite para un unico facturador asociado.
    - No se guardan borradores.
    - Los precios unitarios son enteros en PYG e incluyen IVA.
    - Base imponible e IVA se redondean por linea.
    - La liquidacion por tasa suma lineas ya redondeadas.
    - El link publico usa token opaco, no CDC puro ni ID secuencial.
    - El envio fiscal operativo por defecto es `BATCH`: el SaaS encola por outbox y `facturacion-electronica` despacha comprobantes a SIFEN por lotes.
servers:
  - url: /api/v1

tags:
  - name: System
  - name: Auth
  - name: Contexto
  - name: Clientes
  - name: Catalogo
  - name: Facturas
  - name: NotasCredito
  - name: Entrega
  - name: Backoffice
  - name: Public

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags: [System]
      summary: Healthcheck del SaaS
      security: []
      responses:
        "200":
          description: Servicio disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /fiscal-gateway/health:
    get:
      tags: [System]
      summary: Healthcheck del backend fiscal configurado
      responses:
        "200":
          description: Estado normalizado del gateway fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalGatewayHealthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Sesion iniciada
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Refresh token httpOnly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "423":
          $ref: "#/components/responses/AccountLocked"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token usando cookie httpOnly
      security: []
      responses:
        "200":
          description: Token renovado
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Refresh token httpOnly rotado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesion y revocar refresh token
      responses:
        "204":
          description: Sesion cerrada
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Cookie de refresh limpiada.

  /me/context:
    get:
      tags: [Contexto]
      summary: Obtener contexto operativo del usuario
      description: |
        Devuelve el unico facturador, establecimiento, punto, perfil de emision
        y actividad economica efectiva asociados al operador.
      responses:
        "200":
          description: Contexto operativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationalContextResponse"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/readiness:
    get:
      tags: [Contexto]
      summary: Readiness operativo para emitir
      responses:
        "200":
          description: Estado de readiness
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

  /clientes/search:
    get:
      tags: [Clientes]
      summary: Buscar cliente por documento en agenda y base compartida
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 2
          description: RUC, CI, nombre o razon social.
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: Resultados de busqueda
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClienteSearchResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clientes:
    get:
      tags: [Clientes]
      summary: Listar agenda de clientes del facturador del usuario
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Lista de clientes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Clientes]
      summary: Crear cliente en agenda del facturador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteUpsertRequest"
      responses:
        "201":
          description: Cliente creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /clientes/{clienteId}:
    patch:
      tags: [Clientes]
      summary: Actualizar cliente de la agenda del facturador
      parameters:
        - $ref: "#/components/parameters/ClienteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteUpsertRequest"
      responses:
        "200":
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /catalogo/items/search:
    get:
      tags: [Catalogo]
      summary: Buscar productos o servicios desde el campo codigo
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
          description: Codigo, nombre o descripcion.
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: Resultados de catalogo
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CatalogoItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /catalogo/items:
    get:
      tags: [Catalogo]
      summary: Listar catalogo del facturador
      parameters:
        - $ref: "#/components/parameters/Q"
        - in: query
          name: activo
          schema:
            type: boolean
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Lista de items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogoItemListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Catalogo]
      summary: Crear producto o servicio
      description: |
        Si se crea desde el editor de factura sin IVA explicito, el backend usa IVA 10%.
        Items con IVA 5% o EXENTA deben crearse desde pantalla de catalogo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogoItemUpsertRequest"
      responses:
        "201":
          description: Item creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogoItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Conflicto de codigo o usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catalogo/items/{itemId}:
    patch:
      tags: [Catalogo]
      summary: Actualizar producto o servicio
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogoItemUpsertRequest"
      responses:
        "200":
          description: Item actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogoItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Conflicto de codigo o usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /facturas/preview:
    post:
      tags: [Facturas]
      summary: Validar y calcular totales antes de emitir
      description: |
        No persiste borrador. Solo devuelve validaciones, lineas normalizadas y totales.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacturaPreviewRequest"
      responses:
        "200":
          description: Preview calculado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacturaPreviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Usuario sin configuracion operativa completa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /facturas:
    get:
      tags: [Facturas]
      summary: Listar facturas y notas emitidas del facturador del usuario
      parameters:
        - in: query
          name: tipo
          schema:
            $ref: "#/components/schemas/DocumentoTipo"
        - in: query
          name: tipo_operativo
          description: "Filtro operativo para UI: facturas contado, facturas credito o notas de credito."
          schema:
            $ref: "#/components/schemas/DocumentoTipoOperativo"
        - in: query
          name: estado
          schema:
            $ref: "#/components/schemas/DocumentoEstado"
        - in: query
          name: desde
          schema:
            type: string
            format: date
        - in: query
          name: hasta
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Lista de documentos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    post:
      tags: [Facturas]
      summary: Encolar emision de Factura Electronica contado o credito
      description: |
        Valida y persiste la factura operativa sin crear borrador.
        La llamada a `facturacion-electronica` se procesa por outbox/worker usando
        `external_ref` idempotente y `envio.mode=BATCH` por defecto para el
        facturador. La respuesta inicial puede quedar `EMITIENDO` o
        `PENDIENTE_SIFEN` mientras SIFEN procesa el lote; el numero fiscal, CDC,
        datos de lote y estado final vienen del backend fiscal.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacturaEmitRequest"
      responses:
        "201":
          description: Factura emitida o en proceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoResponse"
        "400":
          description: Header `Idempotency-Key` ausente o invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Idempotencia o conflicto de estado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /facturas/nce-candidatas:
    get:
      tags: [Facturas]
      summary: Listar facturas candidatas para emitir Nota de Credito Electronica
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Facturas candidatas con elegibilidad operativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotaCreditoCandidateListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /facturas/{documentoId}:
    get:
      tags: [Facturas]
      summary: Obtener detalle de factura o nota
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
      responses:
        "200":
          description: Documento encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /facturas/{documentoId}/refresh-status:
    post:
      tags: [Facturas]
      summary: Refrescar estado fiscal desde Ventax FE
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
      responses:
        "200":
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Documento sin CDC fiscal para consultar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Backend fiscal no disponible o rechazo la consulta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Timeout al consultar backend fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /facturas/{documentoId}/retry-emission:
    post:
      tags: [Facturas]
      summary: Reintentar emision fiscal recuperable
      description: |
        Reactiva el outbox de una factura en `PENDIENTE_SIFEN` o `ERROR_TEMPORAL`
        usando el mismo `external_ref` idempotente. No crea una nueva factura
        operativa ni permite reintentar estados finales.
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
      responses:
        "200":
          description: Reintento encolado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Documento no recuperable o sin outbox reintentable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /facturas/{documentoId}/cancelar:
    post:
      tags: [Facturas]
      summary: Cancelar o anular documento elegible
      description: |
        Solo permite solicitar cancelacion de facturas `EMITIDA` con CDC fiscal.
        El SaaS delega la validacion fiscal final al backend `facturacion-electronica`
        mediante `/evento/cancelar` y guarda la respuesta como snapshot/auditoria.
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelacionRequest"
      responses:
        "200":
          description: Cancelacion procesada y documento marcado como ANULADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Documento no elegible para cancelacion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "502":
          description: Backend fiscal rechazo la cancelacion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Timeout al cancelar en backend fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /facturas/{documentoId}/nota-credito:
    post:
      tags: [NotasCredito]
      summary: Emitir Nota de Credito Electronica desde factura elegible
      description: |
        Emite una NCE total en el MVP. Solo acepta facturas `EMITIDA` con CDC
        y bloquea una segunda NCE total sobre la misma factura. El envio fiscal
        tambien usa `envio.mode=BATCH` por defecto y puede quedar
        `PENDIENTE_SIFEN` mientras SIFEN procesa el lote.
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotaCreditoEmitRequest"
      responses:
        "201":
          description: NCE emitida o en proceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Factura no elegible o ya tiene NCE total
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "502":
          description: Backend fiscal rechazo la NCE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Timeout al emitir NCE contra backend fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /facturas/{documentoId}/delivery-link:
    post:
      tags: [Entrega]
      summary: Crear, obtener o regenerar link publico de entrega
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                regenerate:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Link publico disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryLinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /facturas/{documentoId}/artifacts:
    get:
      tags: [Entrega]
      summary: Obtener artefactos disponibles para el operador
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
      responses:
        "200":
          description: Artefactos disponibles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactsResponse"

  /facturas/{documentoId}/email-status:
    get:
      tags: [Entrega]
      summary: Consultar estado informativo del email delegado a Ventax FE
      parameters:
        - $ref: "#/components/parameters/DocumentoId"
      responses:
        "200":
          description: Estado informativo de email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailStatusResponse"

  /public/d/{token}:
    get:
      tags: [Public]
      summary: Ver comprobante publico por token opaco
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            minLength: 32
      responses:
        "200":
          description: Vista publica del documento
          content:
            text/html:
              schema:
                type: string
                description: Pagina HTML publica para cliente final cuando el cliente HTTP acepta HTML.
            application/json:
              schema:
                $ref: "#/components/schemas/PublicDocumentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /public/d/{token}/kude.pdf:
    get:
      tags: [Public]
      summary: Descargar KUDE/PDF publico
      description: >
        Proxy publico del KUDE/PDF fiscal por CDC. La descarga no requiere que el
        documento este aprobado en SIFEN; si existe CDC y el backend fiscal tiene
        XML local suficiente para generar KUDE, el artefacto debe estar disponible
        tambien para estados pendientes o rechazados.
      security: []
      parameters:
        - $ref: "#/components/parameters/PublicToken"
      responses:
        "200":
          description: KUDE/PDF fiscal proxied desde Ventax FE
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Backend fiscal no disponible o rechazo la descarga
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Timeout al descargar desde backend fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /public/d/{token}/xml:
    get:
      tags: [Public]
      summary: Descargar XML publico
      description: >
        Proxy publico del XML fiscal por CDC. La descarga no requiere que el
        documento este aprobado en SIFEN; si existe CDC y XML local en el backend
        fiscal, el artefacto debe estar disponible tambien para estados pendientes
        o rechazados.
      security: []
      parameters:
        - $ref: "#/components/parameters/PublicToken"
      responses:
        "200":
          description: XML fiscal proxied desde Ventax FE
          content:
            application/xml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Backend fiscal no disponible o rechazo la descarga
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Timeout al descargar desde backend fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backoffice/users:
    post:
      tags: [Backoffice]
      summary: Crear usuario operativo o interno
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackofficeUserCreateRequest"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackofficeUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Permiso de backoffice requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username ya existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backoffice/users/{userId}/reset-password:
    post:
      tags: [Backoffice]
      summary: Desbloquear usuario y definir o regenerar password temporal
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackofficePasswordResetRequest"
      responses:
        "200":
          description: Password temporal generado o actualizado; sesiones activas revocadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackofficeUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Permiso de backoffice requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /backoffice/users/{userId}/operation-config:
    put:
      tags: [Backoffice]
      summary: Asociar configuracion operativa unica al usuario
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserOperationConfigRequest"
      responses:
        "200":
          description: Configuracion actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOperationConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Permiso de backoffice requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Usuario o configuracion operativa no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Q:
      in: query
      name: q
      required: false
      schema:
        type: string
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    Offset:
      in: query
      name: offset
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    ClienteId:
      in: path
      name: clienteId
      required: true
      schema:
        type: string
    ItemId:
      in: path
      name: itemId
      required: true
      schema:
        type: string
    DocumentoId:
      in: path
      name: documentoId
      required: true
      schema:
        type: string
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 120
    PublicToken:
      in: path
      name: token
      required: true
      schema:
        type: string
        minLength: 32

  responses:
    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AccountLocked:
      description: Usuario bloqueado por intentos fallidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Error de validacion
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: facturacion-simple-cliente

    FiscalGatewayHealthResponse:
      type: object
      required: [ok, mode]
      properties:
        ok:
          type: boolean
        mode:
          type: string
          enum: [mock, real]
        status:
          type: integer
          nullable: true
        message:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: validation_error
        message:
          type: string
          example: Datos invalidos
        details:
          type: object
          nullable: true
          additionalProperties: true

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Username operativo. Puede ser alias tecnico o email del operador.
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
        user:
          $ref: "#/components/schemas/UserSummary"

    UserSummary:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: string
          nullable: true
        role:
          type: string
          enum: [OPERADOR_FACTURACION, SOPORTE_INTERNO, ADMIN_INTERNO]

    OperationalContextResponse:
      type: object
      required: [user, tenant, facturador, fiscal_context, display]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        tenant:
          $ref: "#/components/schemas/TenantSummary"
        facturador:
          $ref: "#/components/schemas/FacturadorSummary"
        fiscal_context:
          $ref: "#/components/schemas/FiscalContext"
        display:
          $ref: "#/components/schemas/OperationalDisplay"

    TenantSummary:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, CANCELLED]

    FacturadorSummary:
      type: object
      required: [id, emisor_id, razon_social, ruc]
      properties:
        id:
          type: string
        emisor_id:
          type: string
          description: ID del emisor en facturacion-electronica Ventax.
        razon_social:
          type: string
        ruc:
          type: string
        nombre_fantasia:
          type: string
          nullable: true
          description: Nombre fantasia usado solo para visualizacion/UX del SaaS; no reemplaza razon social fiscal ni se envia a fe-api.

    FiscalContext:
      type: object
      required: [establecimiento, punto_expedicion, perfil_emision_codigo, actividad_economica_codigo, timbrado, timbrado_inicio, documento_nro, credito_plazo_dias, fiscal_envio_modo]
      properties:
        establecimiento:
          type: string
          example: "001"
        punto_expedicion:
          type: string
          example: "001"
        perfil_emision_codigo:
          type: string
          example: SERV
        perfil_emision_alias:
          type: string
          nullable: true
          description: Alias visual para la combinacion actividad/perfil asignada al usuario; no altera el contrato fiscal con fe-api.
        actividad_economica_codigo:
          type: string
          example: "82110"
        actividad_economica_descripcion:
          type: string
          nullable: true
        actividad_economica_alias:
          type: string
          nullable: true
          description: Alias visual de la actividad economica activa para UX operativa.
        timbrado:
          type: string
          example: "80136968"
        timbrado_inicio:
          type: string
          format: date
          example: "2025-12-30"
        documento_nro:
          type: string
          description: Numero sugerido/fixture operativo enviado al backend fiscal; la numeracion final la asigna Ventax FE.
          example: "0000000"
        credito_plazo_dias:
          type: integer
          minimum: 1
          example: 30
        fiscal_envio_modo:
          $ref: "#/components/schemas/FiscalEnvioModo"
        batch_enabled:
          type: boolean
          nullable: true
          description: Indica si el backend fiscal tiene configuracion batch efectiva para el emisor/facturador.

    OperationalDisplay:
      type: object
      required: [titulo_operativo]
      properties:
        titulo_operativo:
          type: string
          description: "Titulo UX derivado por actividad economica/perfil del usuario. Fallback: alias actividad/perfil, nombre fantasia, alias actividad, descripcion actividad, razon social."

    ReadinessResponse:
      type: object
      required: [ready, checks]
      properties:
        ready:
          type: boolean
        checks:
          type: array
          items:
            type: object
            required: [code, ok, message]
            properties:
              code:
                type: string
                example: fiscal_backend_ready
              ok:
                type: boolean
              message:
                type: string

    ClienteSearchResult:
      type: object
      required: [source, documento, razon_social]
      properties:
        source:
          type: string
          enum: [AGENDA_FACTURADOR, IDENTIDAD_COMPARTIDA]
        cliente_id:
          type: string
          nullable: true
        documento_tipo:
          $ref: "#/components/schemas/DocumentoIdentidadTipo"
        documento:
          type: string
        razon_social:
          type: string
        direccion:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true
        email:
          type: string
          nullable: true

    ClienteUpsertRequest:
      type: object
      required: [documento_tipo, documento, razon_social]
      properties:
        documento_tipo:
          $ref: "#/components/schemas/DocumentoIdentidadTipo"
        documento:
          type: string
        razon_social:
          type: string
        direccion:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true
        email:
          type: string
          nullable: true

    ClienteResponse:
      allOf:
        - $ref: "#/components/schemas/ClienteSearchResult"
        - type: object
          required: [cliente_id]
          properties:
            cliente_id:
              type: string
            activo:
              type: boolean

    ClienteListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ClienteResponse"
        total:
          type: integer

    DocumentoIdentidadTipo:
      type: string
      enum: [RUC, CI, PASAPORTE, CEDULA_EXTRANJERA, NO_ESPECIFICADO]

    CatalogoItem:
      type: object
      required: [id, codigo, descripcion, precio_unitario, iva_tipo, activo]
      properties:
        id:
          type: string
        codigo:
          type: string
        descripcion:
          type: string
        precio_unitario:
          type: integer
          minimum: 0
          description: Precio con IVA incluido en PYG.
        iva_tipo:
          $ref: "#/components/schemas/IvaTipo"
        activo:
          type: boolean

    CatalogoItemUpsertRequest:
      type: object
      required: [descripcion, precio_unitario]
      properties:
        codigo:
          type: string
          nullable: true
          description: Si se omite, el sistema genera uno.
        descripcion:
          type: string
        precio_unitario:
          type: integer
          minimum: 0
        iva_tipo:
          $ref: "#/components/schemas/IvaTipo"
        activo:
          type: boolean
          default: true

    CatalogoItemListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CatalogoItem"
        total:
          type: integer

    IvaTipo:
      type: string
      enum: [IVA_10, IVA_5, EXENTA]

    CondicionVenta:
      type: string
      enum: [CONTADO, CREDITO]

    TipoTransaccionServicio:
      type: integer
      enum: [1, 2, 3]
      default: 2
      description: |
        Criterio fiscal para clasificacion de transaccion en FE:
        - `1`: Venta de mercaderia
        - `2`: Prestacion de servicios
        - `3`: Mixto (mercaderia + servicios)

    DocumentoTipo:
      type: string
      enum: [FACTURA, NOTA_CREDITO]

    DocumentoTipoOperativo:
      type: string
      enum: [CONTADO, CREDITO, NOTA_CREDITO]

    DocumentoEstado:
      type: string
      enum: [EMITIENDO, EMITIDA, PENDIENTE_SIFEN, RECHAZADA, ERROR_OPERATIVO, ERROR_TEMPORAL, ANULADA]

    FiscalEnvioModo:
      type: string
      description: |
        Modo solicitado por el SaaS al backend `facturacion-electronica`.
        `BATCH` es el default operativo de facturadores; `SYNC` queda para smoke opt-in/desarrollo.
      enum: [BATCH, SYNC]

    FacturaPreviewRequest:
      type: object
      required: [condicion_venta, tipo_transaccion, cliente, items]
      properties:
        condicion_venta:
          $ref: "#/components/schemas/CondicionVenta"
        tipo_transaccion:
          $ref: "#/components/schemas/TipoTransaccionServicio"
        credito_plazo_dias:
          type: integer
          nullable: true
          minimum: 1
          maximum: 365
          description: Plazo de credito seleccionado para esta emision cuando `condicion_venta` es `CREDITO`.
        cliente:
          $ref: "#/components/schemas/FacturaClienteInput"
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/FacturaItemInput"

    FacturaEmitRequest:
      allOf:
        - $ref: "#/components/schemas/FacturaPreviewRequest"
        - type: object
          properties:
            requested_at:
              type: string
              format: date-time

    FacturaClienteInput:
      type: object
      required: [documento_tipo, documento, razon_social]
      properties:
        cliente_id:
          type: string
          nullable: true
        documento_tipo:
          $ref: "#/components/schemas/DocumentoIdentidadTipo"
        documento:
          type: string
        razon_social:
          type: string
        direccion:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true
        email:
          type: string
          nullable: true

    FacturaItemInput:
      type: object
      required: [cantidad, descripcion, precio_unitario]
      properties:
        catalogo_item_id:
          type: string
          nullable: true
        codigo:
          type: string
          nullable: true
        descripcion:
          type: string
        cantidad:
          type: integer
          minimum: 1
        precio_unitario:
          type: integer
          minimum: 0
        iva_tipo:
          $ref: "#/components/schemas/IvaTipo"

    FacturaPreviewResponse:
      type: object
      required: [items, totals]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DocumentoItemSnapshot"
        totals:
          $ref: "#/components/schemas/DocumentoTotals"

    DocumentoItemSnapshot:
      type: object
      required: [line_no, codigo, descripcion, cantidad, precio_unitario, iva_tipo, subtotal, base_imponible, iva_monto]
      properties:
        line_no:
          type: integer
        catalogo_item_id:
          type: string
          nullable: true
        codigo:
          type: string
          nullable: true
        descripcion:
          type: string
        cantidad:
          type: integer
        precio_unitario:
          type: integer
        iva_tipo:
          $ref: "#/components/schemas/IvaTipo"
        subtotal:
          type: integer
        base_imponible:
          type: integer
          description: Redondeado por linea.
        iva_monto:
          type: integer
          description: Redondeado por linea.

    DocumentoTotals:
      type: object
      required: [subtotal, total_sin_iva, iva_5, iva_10, total_iva, total]
      properties:
        subtotal:
          type: integer
        total_sin_iva:
          type: integer
        iva_5:
          type: integer
        iva_10:
          type: integer
        total_iva:
          type: integer
        total:
          type: integer

    DocumentoResponse:
      type: object
      required: [id, tipo, estado, condicion_venta, cliente, items, totals, delivery]
      properties:
        id:
          type: string
        tipo:
          $ref: "#/components/schemas/DocumentoTipo"
        estado:
          $ref: "#/components/schemas/DocumentoEstado"
        condicion_venta:
          $ref: "#/components/schemas/CondicionVenta"
        numero_fiscal:
          type: string
          nullable: true
          example: 001-001-0000123
        cdc:
          type: string
          nullable: true
        fiscal_document_id:
          type: string
          nullable: true
        external_ref:
          type: string
          nullable: true
        fiscal_envio_modo:
          $ref: "#/components/schemas/FiscalEnvioModo"
        batch:
          $ref: "#/components/schemas/BatchTransmissionSummary"
        cliente:
          $ref: "#/components/schemas/FacturaClienteInput"
        items:
          type: array
          items:
            $ref: "#/components/schemas/DocumentoItemSnapshot"
        totals:
          $ref: "#/components/schemas/DocumentoTotals"
        fiscal_status:
          type: object
          nullable: true
          additionalProperties: true
        documento_relacionado_id:
          type: string
          nullable: true
          description: ID de la factura original cuando el documento es una Nota de Credito.
        nce_motivo:
          type: string
          nullable: true
        delivery:
          $ref: "#/components/schemas/DeliverySummary"
        created_at:
          type: string
          format: date-time
          nullable: true

    DocumentoListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DocumentoResponse"
        total:
          type: integer

    BatchTransmissionSummary:
      type: object
      description: Resumen de despacho por lote retornado por `facturacion-electronica`; no incluye XML ni payload fiscal crudo.
      properties:
        batch_id:
          type: string
          nullable: true
        did:
          type: string
          nullable: true
          description: Identificador local de envio de lote en FE.
        dProtConsLote:
          type: string
          nullable: true
          description: Protocolo SIFEN retornado por `siRecepLoteDE` para consulta de lote.
        dCodRes:
          type: string
          nullable: true
          description: Codigo de recepcion de lote; `0300` indica lote recibido con exito.
        dMsgRes:
          type: string
          nullable: true
        dTpoProces:
          type: string
          nullable: true
          description: Tiempo promedio de procesamiento informado por SIFEN.
        result_code:
          type: string
          nullable: true
          description: Codigo de consulta de lote, por ejemplo `0360`, `0361` o `0362`.
        result_message:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          enum: [CREATED, RECEIVED, PROCESSING, DONE, ERROR]

    NotaCreditoCandidate:
      type: object
      required: [documento, elegible, motivo_no_elegible]
      properties:
        documento:
          $ref: "#/components/schemas/DocumentoResponse"
        elegible:
          type: boolean
        motivo_no_elegible:
          type: string
          nullable: true

    NotaCreditoCandidateListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NotaCreditoCandidate"
        total:
          type: integer

    NotaCreditoEmitRequest:
      type: object
      required: [motivo]
      properties:
        motivo:
          type: string
          maxLength: 300
          description: Motivo operativo de la NCE total. Las lineas se copian de la factura original en el MVP.

    CancelacionRequest:
      type: object
      required: [motivo]
      properties:
        motivo:
          type: string
          maxLength: 150

    DeliverySummary:
      type: object
      properties:
        public_url:
          type: string
          nullable: true
        whatsapp_url:
          type: string
          nullable: true
        email_status:
          $ref: "#/components/schemas/EmailStatus"
        artifacts:
          $ref: "#/components/schemas/ArtifactsResponse"

    DeliveryLinkResponse:
      type: object
      required: [public_url, token_status]
      properties:
        public_url:
          type: string
          format: uri
        whatsapp_url:
          type: string
          format: uri
        token_status:
          type: string
          enum: [ACTIVE, REVOKED]

    ArtifactsResponse:
      type: object
      required: [kude_pdf, xml]
      properties:
        kude_pdf:
          $ref: "#/components/schemas/ArtifactLink"
        xml:
          $ref: "#/components/schemas/ArtifactLink"

    ArtifactLink:
      type: object
      required: [available]
      properties:
        available:
          type: boolean
          description: true cuando el SaaS tiene CDC para construir la URL del artefacto; no implica aprobacion SIFEN.
        url:
          type: string
          format: uri
          nullable: true

    EmailStatus:
      type: string
      enum: [NOT_APPLICABLE, DELEGATED, SENT, FAILED, UNKNOWN]

    EmailStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/EmailStatus"
        message:
          type: string
          nullable: true

    PublicDocumentResponse:
      type: object
      required: [facturador, numero_fiscal, estado, cliente, totals, email_status, artifacts]
      properties:
        facturador:
          $ref: "#/components/schemas/FacturadorSummary"
        numero_fiscal:
          type: string
          nullable: true
        cdc:
          type: string
          nullable: true
        estado:
          $ref: "#/components/schemas/DocumentoEstado"
        cliente:
          $ref: "#/components/schemas/FacturaClienteInput"
        totals:
          $ref: "#/components/schemas/DocumentoTotals"
        email_status:
          $ref: "#/components/schemas/EmailStatus"
        artifacts:
          $ref: "#/components/schemas/ArtifactsResponse"

    BackofficeUserCreateRequest:
      type: object
      required: [username, display_name, role]
      properties:
        username:
          type: string
          description: Username operativo. Puede ser alias tecnico o email del operador.
        display_name:
          type: string
        role:
          type: string
          enum: [OPERADOR_FACTURACION, SOPORTE_INTERNO, ADMIN_INTERNO]
        temporary_password:
          type: string
          format: password
          nullable: true

    BackofficePasswordResetRequest:
      type: object
      properties:
        temporary_password:
          type: string
          format: password
          nullable: true

    BackofficeUserResponse:
      type: object
      required: [id, username, role, active]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
        active:
          type: boolean
        temporary_password:
          type: string
          format: password
          nullable: true
          description: Solo se devuelve en creacion o reset; no se persiste en claro.

    UserOperationConfigRequest:
      type: object
      required: [tenant_id, facturador_id, emisor_id, establecimiento, punto_expedicion, perfil_emision_codigo, actividad_economica_codigo]
      properties:
        tenant_id:
          type: string
          format: uuid
        facturador_id:
          type: string
          format: uuid
        emisor_id:
          type: string
        establecimiento:
          type: string
        punto_expedicion:
          type: string
        perfil_emision_codigo:
          type: string
        actividad_economica_codigo:
          type: string

    UserOperationConfig:
      allOf:
        - $ref: "#/components/schemas/UserOperationConfigRequest"
        - type: object
          required: [user_id, active]
          properties:
            user_id:
              type: string
            active:
              type: boolean
