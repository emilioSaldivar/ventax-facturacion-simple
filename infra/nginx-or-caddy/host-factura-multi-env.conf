# Facturacion Simple - staging + production
# Copiar los bloques al sitio Nginx del host y ejecutar:
#   sudo nginx -t
#   sudo systemctl reload nginx

# ======================
# FACTURACION SIMPLE STAGING
# ======================
server {
    listen 80;
    server_name staging-factura.ventax.app;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name staging-factura.ventax.app;

    ssl_certificate /etc/ssl/cloudflare/ventax.app.pem;
    ssl_certificate_key /etc/ssl/cloudflare/ventax.app.key;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8092;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

