server {
  listen 80;
  server_name _;

  location = /healthz {
    access_log off;
    add_header Content-Type application/json;
    return 200 '{"status":"ok","service":"frontend"}';
  }

  location /api/v1/ {
    proxy_pass http://api:8080/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /public/ {
    proxy_pass http://api:8080/public/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vite-hashed assets (filename includes content hash): cache forever
  location ~* ^/(app|backoffice)/assets/ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /backoffice {
    return 302 $scheme://$http_host/backoffice/;
  }

  location /backoffice/ {
    alias /usr/share/nginx/html/backoffice/;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /backoffice/index.html;
  }

  location = /app {
    return 302 $scheme://$http_host/app/;
  }

  location /app/ {
    alias /usr/share/nginx/html/app/;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /app/index.html;
  }

  location = / {
    return 302 $scheme://$http_host/app/;
  }
}
