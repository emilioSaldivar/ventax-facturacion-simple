  /factura:
    post:
      tags: [Emision]
      summary: Emitir Factura Electrónica (CONTADO o CREDITO)
      description: |
        Crea/obtiene un DE idempotente, genera XML v150, firma, inserta QR (AA002).
        Si envio.mode=SYNC: intenta enviar inmediatamente a SIFEN.
        Si envio.mode=BATCH: encola para envío por lote.
        Si envio.mode=AUTO: intenta SYNC y ante falla técnica pasa a cola BATCH.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmitirFacturaRequest"
      responses:
        "200":
          description: Emitida (o encolada) correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirFacturaResponse"
        "202":
          description: Documento aceptado localmente y encolado por fallback AUTO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirFacturaResponse"
        "409":
          description: Documento ya existe (idempotencia)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validación de datos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dev/smoke/emit-fe:
    post:
      tags: [Emision]
      summary: Smoke test de emisión FE SYNC (solo desarrollo)
      description: |
        Ejecuta el pipeline real xmlgen -> xmlsign -> qrgen -> setapi.recibe usando fixture interno.
        Requiere API key y APP_ENV=dev.
      responses:
        "200":
          description: Emisión smoke completada
          content:
            application/json:
              schema:
                type: object
                required: [correlation_id, status]
                properties:
                  cdc:
                    type: string
                    nullable: true
                  correlation_id:
                    type: string
                  status:
                    type: object
                    additionalProperties: true
                  xml_final:
                    type: string
                    nullable: true
        "401":
          description: API key inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Endpoint no permitido fuera de dev
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error al ejecutar smoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /evento/cancelar:
    post:
      tags: [Eventos]
      summary: Cancelar un DE (Factura) por CDC
      description: |
        Reglas MVP:
        - Solo si el DE está aprobado (APPROVED / APPROVED_WITH_OBS).
        - Validar ventana operativa de cancelación (48h para FE).
        Envía evento a SIFEN y persiste resultado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelarRequest"
      responses:
        "200":
          description: Evento procesado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventoResponse"
        "404":
          description: Documento no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Estado no permite cancelación / fuera de ventana
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validación de datos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /evento/inutilizacionnumfactura:
    post:
      tags: [Eventos]
      summary: Inutilizar rango de numeración FE
      description: |
        Inutiliza un rango secuencial de numeración (hasta 1000).
        Reglas MVP:
        - motivo requerido (<=150 chars)
        - rango secuencial válido
        - no permitir inutilizar números ya utilizados por DE aprobados
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InutilizarRequest"
      responses:
        "200":
          description: Evento procesado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventoResponse"
        "409":
          description: Rango inválido / contiene utilizados / conflicto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validación de datos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consultar/comprobante/{cdc}:
    get:
