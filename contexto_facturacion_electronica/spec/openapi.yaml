  /consultar/{id}/batch-pendientes:
    get:
      tags: [Consultas]
      summary: Consultar cola y lotes pendientes por emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          schema:
            type: string
            enum: [test, prod]
        - in: query
          name: tipoDocumento
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Cola y lotes pendientes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPendientesResponse"
        "422":
          description: Validación de datos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /files/ticket/{cdc}/raw:
    get:
      tags: [Archivos]
      summary: Obtener ticket térmico crudo por CDC
      description: |
        Genera una salida de ticket térmico a partir del XML local del Documento Electrónico.

        Modos soportados:
        - sin `format`: devuelve ticket en `text/plain`
        - con `format=escpos`: devuelve payload binario `ESC/POS` listo para impresora térmica
      parameters:
        - in: path
          name: cdc
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento cuando la base aloja mas de un ambiente.
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [escpos]
          description: Si vale `escpos`, retorna `application/octet-stream`. Si se omite, retorna `text/plain`.
      responses:
        "200":
          description: Ticket generado correctamente
          content:
            text/plain:
              schema:
                type: string
              examples:
                rawTicket:
                  summary: Ticket texto plano
                  value: |
                    80136968-1
                    AWAPURA E.A.S. UNIPERSONAL
                    3 de febrero
                    VILLA ELISA
                    Tel: 0981296077
                    ------------------------------------------------
                    Timbrado:         80136968
                    Documento:        Factura electronica
                    Numero:           001-001-0000953
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: No existe XML local asociado al CDC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: raw_ticket_not_found
                    message: Ticket crudo no encontrado
        "500":
          description: Fallo al transformar el XML a ticket térmico
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                generationFailed:
                  value:
                    error: raw_ticket_generation_failed
                    message: No se pudo generar el ticket crudo

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    EmisorIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    DocumentStatus:
      type: string
      description: Estado interno del DE
      enum:
        - DRAFT
        - XML_GENERATED
        - XML_SIGNED
        - QR_ATTACHED
        - TRANSMISSION_FAILED
        - QUEUED_SYNC
        - SENT_SYNC
        - QUEUED_BATCH
        - SENT_BATCH
        - APPROVED
        - APPROVED_WITH_OBS
        - REJECTED
        - CANCEL_REQUESTED
        - CANCELLED
        - VOID_REQUESTED
        - VOIDED

    EmitMode:
      type: string
      enum: [SYNC, BATCH, AUTO]

    CondicionOperacion:
      type: string
      enum: [CONTADO, CREDITO]

    NumberingInstruction:
      type: object
      description: Metadata opcional para clientes externos que desean delegar la numeracion al servicio.
      properties:
        mode:
          type: string
          enum: [ONLINE]
          default: ONLINE
        authority:
          type: string
          description: Autoridad esperada para determinar el numero fiscal final.
          enum: [SERVICE, CLIENT]
          default: SERVICE
        requested_document_number:
          type: string
          nullable: true
          description: Numero sugerido por el cliente; el servicio puede conservarlo solo como auditoria.

    ExternalClientReference:
      type: object
      description: Metadata opcional del sistema consumidor para trazabilidad e idempotencia.
      properties:
        source_system:
          type: string
          example: external-client
        entity_type:
          type: string
          example: sale
        entity_id:
          type: string
          example: "68"
        request_id:
          type: string
          example: mov-136
        idempotency_key:
          type: string
          example: mov-136
        operational_series:
          type: string
          nullable: true
          example: SERV
          description: Serie comercial/operativa del sistema consumidor. No se copia automaticamente a `dSerieNum`.

    ResolvedEmissionProfile:
      type: object
      nullable: true
      description: Perfil operativo/fiscal resuelto por el servicio para la emision.
      properties:
        code:
          type: string
          example: SERV
        description:
          type: string
          nullable: true
          example: Servicios
        actividadEconomicaCodigo:
          type: string
          example: "82110"
        separation_strategy:
          type: string
          enum: [SHARED_SEQUENCE, FISCAL_SERIES, SEPARATE_EXPEDITION_POINT]
          example: SHARED_SEQUENCE
        serie_operativa:
          type: string
          nullable: true
          example: SERV
        serie_fiscal:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
          example: AA
          description: Serie fiscal SIFEN `C010 dSerieNum`, si aplica.

    ResolvedTimbrado:
      type: object
      required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
      properties:
        timbrado:
          type: string
        establecimiento:
          type: string
          example: "001"
        puntoExpedicion:
          type: string
          example: "001"
        documentoNro:
          type: string
          example: "0001081"
        fecIni:
          type: string
          format: date

    EmitirFacturaRequest:
      type: object
      required:
        - emisor_id
        - actividadEconomicaCodigo
        - timbrado
        - receptor
        - fecha
        - condicionOperacion
        - items
        - envio
      properties:
        emisor_id:
          type: string
          description: Identificador interno del emisor en tu sistema
        actividadEconomicaCodigo:
          type: string
          example: "82110"
          description: |
            Codigo de actividad economica declarada/configurada para el emisor. Es obligatorio.
            El servicio debe validarlo contra actividades activas del emisor y contra el perfil/boca de emision.
            Este codigo no particiona por si solo la numeracion fiscal ni permite repetir numeros.
        emission_profile_code:
          type: string
          nullable: true
          example: SERV
          description: |
            Codigo de perfil de emision configurado en FE. Permite resolver timbrado, punto, serie fiscal,
            numerador y estrategia de separacion. Si se omite, FE solo puede usar un perfil default no ambiguo.
        timbrado:
          type: object
          required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
          properties:
            timbrado:
              type: string
            establecimiento:
              type: string
              example: "001"
            puntoExpedicion:
              type: string
              example: "001"
            documentoNro:
              type: string
              example: "0000001"
              description: |
                Numero sugerido o referencial provisto por el cliente. En contratos con numeracion delegada,
                el servicio puede usarlo solo como referencia y asignar el numero fiscal oficial desde su propio numerador.
            fecIni:
              type: string
              format: date
        numbering:
          $ref: "#/components/schemas/NumberingInstruction"
        client_reference:
          $ref: "#/components/schemas/ExternalClientReference"
        receptor:
          type: object
          required: [docNro, razonSocial]
          properties:
            tipoDocumento:
              type: string
              description: Tipo de documento del receptor. Si se omite, se asume `CI`.
              enum: [CI, RUC, PASAPORTE, CEDULA_EXTRANJERA, CARNET_RESIDENCIA, INNOMINADO, TARJETA_DIPLOMATICA, NO_ESPECIFICADO]
              default: CI
            docNro:
              type: string
              description: Número de documento. Para `RUC` puede enviarse solo la base y complementar con `dv`, o el valor completo `base-dv`.
            dv:
              type: string
              nullable: true
              description: Dígito verificador del RUC. Usado cuando `tipoDocumento=RUC` y `docNro` no incluye guion.
            razonSocial:
              type: string
            direccion:
              type: string
              nullable: true
            telefono:
              type: string
              nullable: true
        fecha:
          type: string
          format: date-time
        condicionOperacion:
          type: object
          required: [tipo]
          properties:
            tipo:
              $ref: "#/components/schemas/CondicionOperacion"
            pagos:
              type: array
              description: Solo para CONTADO. Para CREDITO debe ir vacío o ausente.
              items:
                type: object
                required: [medio, monto]
                properties:
                  medio:
                    type: string
                    description: "Ej: EFECTIVO, TARJETA, TRANSFERENCIA, etc."
                  monto:
                    type: number
                    format: double
            plazoDias:
              type: integer
              nullable: true
            vencimiento:
              type: string
              format: date
              nullable: true
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [codigo, descripcion, cantidad, precioUnitario, ivaTipo]
            properties:
              codigo:
                type: string
              descripcion:
                type: string
              cantidad:
                type: number
                format: double
              precioUnitario:
                type: number
                format: double
                description: Precio unitario IVA incluido (según tu modelo actual)
              ivaTipo:
                type: string
                description: "Ej: IVA10, IVA5, EXENTO (mapear a MT v150 internamente)"
        envio:
          type: object
          required: [mode]
          properties:
            mode:
              $ref: "#/components/schemas/EmitMode"
            sendNow:
              type: boolean
              default: true

