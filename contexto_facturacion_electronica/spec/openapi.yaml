              schema:
                $ref: "#/components/schemas/AdminUserEmisorAssignmentListResponse"
    put:
      tags: [Admin]
      summary: Reemplazar asignaciones de facturadores del usuario
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
