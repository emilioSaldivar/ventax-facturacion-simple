              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consultar/comprobanteSifen/{cdc}:
    get:
      tags: [Consultas]
      summary: Consultar estado en SIFEN por CDC
      description: |
        Si refresh=true, consulta en SIFEN y actualiza cache.
        Si refresh=false, devuelve el cache persistido.
      parameters:
        - in: path
          name: cdc
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento y destino de la consulta remota a SIFEN.
        - in: query
          name: refresh
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Estado SIFEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SifenStatusResponse"
        "404":
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consultar/{id}/facturalista/{numero}:
    get:
      tags: [Consultas]
      summary: Listar facturas (compatibilidad DocuJSON)
      description: |
        Mantiene el path esperado: /consultar/{id}/facturalista/{numero}
        Interpretación MVP:
        - {id} = emisor_id o tenant_id (definir en implementación, por defecto emisor_id)
        - {numero} = cursor/offset (int)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: numero
          required: true
          schema:
            type: integer
        - in: query
          name: env
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento cuando la base aloja mas de un ambiente.
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/DocumentStatus"
        - in: query
          name: q
          schema:
            type: string
      responses:
        "200":
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListaFacturasResponse"

  /consultar/evento/{cdc}:
    get:
