openapi: 3.0.3
info:
  title: Facturación Electrónica SIFEN - MVP v0.1
  version: 0.1.0
  description: |
    Servicio Node.js para SIFEN (Paraguay) conforme Manual Técnico v150.
    MVP: Emisión FE (CONTADO/CREDITO), firma, QR, envío SYNC/Lote, eventos (cancelación/inutilización), consultas/listado.

servers:
  - url: /fcws

tags:
  - name: System
  - name: Admin
  - name: Emision
  - name: Eventos
  - name: Consultas
  - name: Archivos

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags: [System]
      summary: Healthcheck
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: facturacion-electronica
                  db:
                    type: boolean
                    example: true

  /admin/emisores:
    get:
      tags: [Admin]
      summary: Listar facturadores/emisores
      parameters:
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
        - in: query
          name: activo
          required: false
          schema:
            type: boolean
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Lista paginada de emisores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEmisorListResponse"
    post:
      tags: [Admin]
      summary: Crear emisor
      description: Primer paso secuencial del ABM. Crea el registro base del emisor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminEmisorUpsertRequest"
      responses:
        "201":
          description: Emisor creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEmisorResponse"

  /admin/emisores/{id}:
    get:
      tags: [Admin]
      summary: Obtener emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Emisor encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEmisorResponse"
    patch:
      tags: [Admin]
      summary: Actualizar emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminEmisorUpsertRequest"
      responses:
        "200":
          description: Emisor actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEmisorResponse"

  /admin/emisores/{id}/actividades:
    get:
      tags: [Admin]
      summary: Listar actividades economicas del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Actividades del emisor
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminActividadResponse"
    post:
      tags: [Admin]
      summary: Crear actividad economica del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActividadRequest"
      responses:
        "201":
          description: Actividad creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActividadResponse"

  /admin/emisores/{id}/actividades/{actividadId}:
    patch:
      tags: [Admin]
      summary: Actualizar actividad economica del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: actividadId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActividadRequest"
      responses:
        "200":
          description: Actividad actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActividadResponse"

  /admin/emisores/{id}/timbrado-actividades:
    get:
      summary: Listar cobertura operativa de actividades por timbrado
      parameters:
        - $ref: "#/components/parameters/EmisorIdPath"
        - { name: timbrado_id, in: query, schema: { type: string } }
        - { name: actividad_id, in: query, schema: { type: string } }
        - { name: establecimiento_id, in: query, schema: { type: string } }
        - { name: punto_expedicion_id, in: query, schema: { type: string } }
        - { name: tipo_documento, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Cobertura operativa configurada
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminTimbradoActividadResponse"
    post:
      summary: Crear cobertura operativa de actividad por timbrado
      parameters:
        - $ref: "#/components/parameters/EmisorIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTimbradoActividadRequest"
      responses:
        "201":
          description: Cobertura creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTimbradoActividadResponse"

  /admin/emisores/{id}/timbrado-actividades/{coberturaId}:
    patch:
      summary: Actualizar cobertura operativa de actividad por timbrado
      parameters:
        - $ref: "#/components/parameters/EmisorIdPath"
        - name: coberturaId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTimbradoActividadRequest"
      responses:
        "200":
          description: Cobertura actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTimbradoActividadResponse"

  /admin/emisores/{id}/perfiles-emision:
    get:
      summary: Listar perfiles de emision del emisor
      parameters:
        - $ref: "#/components/parameters/EmisorIdPath"
      responses:
        "200":
          description: Perfiles de emision configurados
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminPerfilEmisionResponse"
    post:
      summary: Crear perfil de emision
      parameters:
        - $ref: "#/components/parameters/EmisorIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPerfilEmisionRequest"
      responses:
        "201":
          description: Perfil creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPerfilEmisionResponse"

  /admin/emisores/{id}/establecimientos:
    get:
      tags: [Admin]
      summary: Listar establecimientos del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Establecimientos del emisor
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminEstablecimientoResponse"
    post:
      tags: [Admin]
      summary: Crear establecimiento
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminEstablecimientoRequest"
      responses:
        "201":
          description: Establecimiento creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEstablecimientoResponse"

  /admin/emisores/{id}/establecimientos/{establecimientoId}:
    patch:
      tags: [Admin]
      summary: Actualizar establecimiento
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: establecimientoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminEstablecimientoRequest"
      responses:
        "200":
          description: Establecimiento actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEstablecimientoResponse"

  /admin/establecimientos/{establecimientoId}/puntos:
    get:
      tags: [Admin]
      summary: Listar puntos de expedicion del establecimiento
      parameters:
        - in: path
          name: establecimientoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Puntos del establecimiento
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminPuntoExpedicionResponse"
    post:
      tags: [Admin]
      summary: Crear punto de expedicion
      parameters:
        - in: path
          name: establecimientoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPuntoExpedicionRequest"
      responses:
        "201":
          description: Punto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPuntoExpedicionResponse"

  /admin/establecimientos/{establecimientoId}/puntos/{puntoId}:
    patch:
      tags: [Admin]
      summary: Actualizar punto de expedicion
      parameters:
        - in: path
          name: establecimientoId
          required: true
          schema:
            type: string
        - in: path
          name: puntoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPuntoExpedicionRequest"
      responses:
        "200":
          description: Punto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPuntoExpedicionResponse"

  /admin/emisores/{id}/timbrados:
    get:
      tags: [Admin]
      summary: Listar timbrados del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Timbrados del emisor
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminTimbradoResponse"
    post:
      tags: [Admin]
      summary: Crear timbrado del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTimbradoRequest"
      responses:
        "201":
          description: Timbrado creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTimbradoResponse"

  /admin/emisores/{id}/timbrados/{timbradoId}:
    patch:
      tags: [Admin]
      summary: Actualizar timbrado del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: timbradoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTimbradoRequest"
      responses:
        "200":
          description: Timbrado actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTimbradoResponse"

  /admin/emisores/{id}/csc:
    get:
      tags: [Admin]
      summary: Listar CSC del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSC del emisor
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminCscResponse"
    post:
      tags: [Admin]
      summary: Crear CSC del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCscRequest"
      responses:
        "201":
          description: CSC creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCscResponse"

  /admin/emisores/{id}/csc/{cscRowId}:
    patch:
      tags: [Admin]
      summary: Actualizar CSC del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: cscRowId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCscRequest"
      responses:
        "200":
          description: CSC actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCscResponse"

  /admin/emisores/{id}/certificados:
    get:
      tags: [Admin]
      summary: Listar certificados del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Certificados del emisor
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminCertificadoResponse"
    post:
      tags: [Admin]
      summary: Crear certificado del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCertificadoRequest"
      responses:
        "201":
          description: Certificado creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCertificadoResponse"

  /admin/emisores/{id}/certificados/{certificadoId}:
    patch:
      tags: [Admin]
      summary: Actualizar certificado del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: certificadoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCertificadoRequest"
      responses:
        "200":
          description: Certificado actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCertificadoResponse"

  /admin/emisores/{id}/numeradores:
    get:
      tags: [Admin]
      summary: Listar numeradores del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Numeradores del emisor
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminNumeradorResponse"
    post:
      tags: [Admin]
      summary: Crear numerador del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminNumeradorRequest"
      responses:
        "201":
          description: Numerador creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNumeradorResponse"

  /admin/emisores/{id}/numeradores/{numeradorId}:
    patch:
      tags: [Admin]
      summary: Actualizar numerador del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: numeradorId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminNumeradorRequest"
      responses:
        "200":
          description: Numerador actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNumeradorResponse"

  /admin/emisores/{id}/batch-config:
    put:
      tags: [Admin]
      summary: Crear o actualizar override batch del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBatchConfigRequest"
      responses:
        "200":
          description: Configuracion batch del emisor persistida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBatchConfigResponse"
    delete:
      tags: [Admin]
      summary: Eliminar override batch del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: true
          schema:
            type: string
            enum: [test, prod]
      responses:
        "204":
          description: Override eliminado; aplica fallback default

  /admin/emisores/{id}/batch-config-efectiva:
    get:
      tags: [Admin]
      summary: Obtener configuracion batch efectiva del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: true
          schema:
            type: string
            enum: [test, prod]
      responses:
        "200":
          description: Configuracion batch efectiva
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBatchConfigResponse"

  /admin/emisores/{id}/readiness:
    get:
      tags: [Admin]
      summary: Obtener readiness del emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: true
          schema:
            type: string
            enum: [test, prod]
      responses:
        "200":
          description: Estado operativo del emisor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReadinessResponse"

  /admin/emisores/{id}/configuracion:
    get:
      tags: [Admin]
      summary: Obtener configuracion agregada del facturador
      description: |
        Devuelve una vista agregada del facturador para frontend administrativo:
        emisor, actividades, establecimientos, puntos, timbrados, CSC, certificados,
        numeradores, batch efectivo y readiness.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
      responses:
        "200":
          description: Configuracion agregada del facturador
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturadorConfiguracionResponse"

  /admin/emisores/{id}/certificados/upload:
    post:
      tags: [Admin]
      summary: Subir certificado cualificado .pfx/.p12
      description: |
        Recibe un certificado PKCS#12 mediante multipart/form-data, lo almacena
        en storage privado y registra la metadata operativa del certificado.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AdminCertificadoUploadRequest"
      responses:
        "201":
          description: Certificado cargado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCertificadoUploadResponse"
        "422":
          description: Archivo o metadata invalida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emisores/{id}/facturas/estado:
    get:
      tags: [Admin]
      summary: Consultar estado de facturas por facturador
      description: |
        Devuelve una bandeja operativa con resumen por estado interno y estado SIFEN cacheado.
        Pensado para frontend administrativo por facturador/emisor.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
        - in: query
          name: establecimiento
          required: false
          schema:
            type: string
        - in: query
          name: punto
          required: false
          schema:
            type: string
        - in: query
          name: tipoDocumento
          required: false
          schema:
            type: string
            enum: [FE, NCE]
          description: Filtra por tipo de documento electronico.
        - in: query
          name: condicionOperacion
          required: false
          schema:
            type: string
            enum: [CONTADO, CREDITO]
          description: Filtra por condicion de operacion del documento.
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/DocumentStatus"
        - in: query
          name: sifenStatus
          required: false
          schema:
            type: string
        - in: query
          name: freshness
          required: false
          schema:
            type: string
            enum: [fresh, stale, missing]
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
          description: Fecha de emision desde.
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
          description: Fecha de emision hasta.
        - in: query
          name: sentFrom
          required: false
          schema:
            type: string
            format: date
          description: Fecha de envio/transmision a SIFEN desde.
        - in: query
          name: sentTo
          required: false
          schema:
            type: string
            format: date
          description: Fecha de envio/transmision a SIFEN hasta.
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Bandeja operativa del facturador
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaEstadoListResponse"

  /admin/emisores/{id}/facturas/{documentId}:
    get:
      tags: [Admin]
      summary: Obtener detalle administrativo de factura
      description: |
        Devuelve el detalle operativo de una factura, incluyendo verificacion local/SIFEN,
        si fue aceptada por SIFEN y datos necesarios para UI de correccion operativa.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detalle administrativo de la factura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaDetalleResponse"
        "403":
          description: Usuario sin acceso al facturador
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emisores/{id}/facturas/{documentId}/body:
    patch:
      tags: [Admin]
      summary: Editar cuerpo de factura no aceptada
      description: |
        Permite corregir el cuerpo normalizado de una factura no aceptada por SIFEN.
        No se permite modificar in-place documentos APPROVED o APPROVED_WITH_OBS.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFacturaBodyPatchRequest"
      responses:
        "200":
          description: Factura actualizada y lista para reenvio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaDetalleResponse"
        "409":
          description: Documento no elegible para edicion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emisores/{id}/facturas/{documentId}/resend:
    post:
      tags: [Admin]
      summary: Reenviar factura corregida a SIFEN
      description: |
        Regenera XML, firma y QR a partir del cuerpo vigente y reintenta la transmision.
        Solo aplica a documentos no aceptados por SIFEN.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFacturaResendRequest"
      responses:
        "200":
          description: Reenvio ejecutado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaResendResponse"
        "202":
          description: Documento reenviado o reencolado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaResendResponse"
        "409":
          description: Documento no elegible para reenvio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emisores/{id}/facturas/{documentId}/revisiones:
