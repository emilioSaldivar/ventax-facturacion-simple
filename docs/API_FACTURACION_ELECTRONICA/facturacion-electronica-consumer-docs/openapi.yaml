  # ─── Batch Consulta MT150 — T002/T003 ────────────────────────────────────

  /consultar/{id}/lotes:
    get:
      tags: [Consultas]
      summary: Listar lotes de un facturador por rango de fechas
      description: |
        Listado paginado de lotes SIFEN de un facturador con filtros operativos.
        No confundir `did` (identificador interno del sistema) con `sifen_protocol`
        (`dProtConsLote` de SIFEN), que es el identificador de consulta real.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: RUC completo del facturador (emisor_id)
          schema:
            type: string
        - name: env
          in: query
          schema:
            type: string
            enum: [test, prod]
        - name: from
          in: query
          description: Inicio del rango temporal (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Fin del rango temporal (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: string
            enum: [CREATED, SENT, RECEIVED, PROCESSING, DONE, ERROR]
        - name: tipoDocumento
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Lista de lotes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchListResponse"
        "401":
          description: API key inválida
        "422":
          description: Parámetros de query inválidos

  /consultar/{id}/lotes/{protocol}:
    get:
      tags: [Consultas]
      summary: Consulta puntual de lote por protocolo SIFEN (dProtConsLote)
      description: |
        Consulta un lote identificado por su `dProtConsLote` (protocolo SIFEN real).
        Con `refresh=true`, ejecuta `setapi.consultaLote` con el protocolo real y persiste
        el resultado usando el mismo parser MT150 del worker de polling.
        **Throttling**: refresh omitido para lotes ya concluyentes (DONE/ERROR).
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: RUC completo del facturador (emisor_id)
          schema:
            type: string
        - name: protocol
          in: path
          required: true
          description: Protocolo SIFEN del lote (dProtConsLote retornado en recepción)
          schema:
            type: string
        - name: env
          in: query
          schema:
            type: string
            enum: [test, prod]
        - name: refresh
          in: query
          description: |
            Si true, consulta SIFEN en tiempo real y persiste resultado.
            Omitido automáticamente para lotes DONE/ERROR.
          schema:
            type: string
            enum: ["true", "false"]
            default: "false"
      responses:
        "200":
          description: Detalle del lote con estado actual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchByProtocolResponse"
        "401":
          description: API key inválida
        "404":
          description: Protocolo no encontrado para el facturador
        "422":
          description: Parámetros inválidos

