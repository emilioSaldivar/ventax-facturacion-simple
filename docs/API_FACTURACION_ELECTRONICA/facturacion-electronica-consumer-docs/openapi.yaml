      tags: [Admin]
      summary: Solicitar sincronizacion masiva de estado SIFEN por facturador
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFacturaEstadoSyncRequest"
      responses:
        "202":
          description: Job de sincronizacion creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaEstadoSyncResponse"

  /admin/emisores/{id}/facturas/estado/sync/{jobId}:
    get:
      tags: [Admin]
      summary: Consultar resultado de sincronizacion masiva de estado SIFEN
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estado del job de sincronizacion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaEstadoSyncJobResponse"

  /admin/emisores/{id}/numeration-gaps:
    get:
      tags: [Admin]
      summary: Listar huecos de numeracion por facturador
      description: |
        Devuelve huecos de numeracion detectados para el facturador, con estado y accion sugerida.
        Estados posibles: PENDING_CHECK, RETRY_POSSIBLE, READY_TO_VOID, VOID_REQUESTED, VOIDED,
        BLOCKED_APPROVED_EXISTS, EXPIRED_WINDOW.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          schema:
            type: string
            enum: [test, prod]
        - in: query
          name: gap_state
          schema:
            type: string
            enum: [PENDING_CHECK, RETRY_POSSIBLE, READY_TO_VOID, VOID_REQUESTED, VOIDED, BLOCKED_APPROVED_EXISTS, EXPIRED_WINDOW]
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Lista de huecos de numeracion
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NumerationGapItem"
                  next:
                    type: integer
                    nullable: true

  /admin/emisores/{id}/numeration-gaps/{gapId}:
    get:
      tags: [Admin]
      summary: Detalle de un hueco de numeracion
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: gapId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detalle del hueco con elegibilidad de inutilizacion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NumerationGapDetail"
        "404":
          description: Hueco no encontrado

  /admin/emisores/{id}/numeration-gaps/{gapId}/void:
    post:
      tags: [Admin]
      summary: Inutilizar numeracion de un hueco
      description: |
        Ejecuta la inutilizacion fiscal del rango del hueco via SIFEN.
        Solo aplica cuando gap_state es PENDING_CHECK o READY_TO_VOID y la ventana de 15 dias esta vigente.
        Codigos de motivo disponibles: NUM_GAP_SYSTEM_ERROR, TECHNICAL_FILLING_ERROR,
        SIFEN_REJECT_CDC_CHANGE, MANUAL_BUSINESS_DECISION.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: gapId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                motivo_codigo:
                  type: string
                  enum: [NUM_GAP_SYSTEM_ERROR, TECHNICAL_FILLING_ERROR, SIFEN_REJECT_CDC_CHANGE, MANUAL_BUSINESS_DECISION]
                  default: NUM_GAP_SYSTEM_ERROR
                motivo_texto:
                  type: string
                  maxLength: 150
                  description: Texto libre de motivo. Si se provee reemplaza la plantilla del codigo.
      responses:
        "200":
          description: Inutilizacion ejecutada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NumerationGapVoidResult"
        "409":
          description: Hueco no elegible (ventana vencida, estado invalido o ya inutilizado)
        "404":
          description: Hueco no encontrado

  # ─── Eventos admin — TEA001 ───────────────────────────────────────────────

  /admin/emisores/{id}/eventos:
    get:
      tags: [Admin]
      summary: Listar eventos fiscales del emisor
      description: Listado paginado de eventos CANCEL y VOID_RANGE con filtros operativos.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: env
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [CANCEL, VOID_RANGE]
        - name: status
          in: query
          schema:
            type: string
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Texto libre — busca en CDC, idempotency_key, range_from, range_to
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventoAdminItem"
                  next:
                    type: integer
                    nullable: true
        "401":
          description: No autenticado
        "403":
          description: Sin acceso al emisor
        "404":
          description: Emisor no encontrado

  /admin/emisores/{id}/eventos/refresh:
    post:
      tags: [Admin]
      summary: Refresh masivo de eventos del emisor
      description: Refresca hasta 50 eventos no concluyentes o sin refresh reciente.
      security:
