  /factura:
    post:
      tags: [Emision]
      summary: Emitir Factura Electrónica (CONTADO o CREDITO)
      description: |
        Crea/obtiene un DE idempotente, genera XML v150, firma, inserta QR (AA002).

        **Autenticacion**: requiere API key de consumidor (`X-Api-Key`). La API key global queda retirada de este endpoint.

        **Idempotencia**: `client_reference.idempotency_key` es **obligatorio**. Formato: `^[A-Za-z0-9_-]{8,80}$`.
        La unicidad es compuesta: `consumer_id + emisor_id + env + idempotency_key`.
        Si el consumidor reintenta con la misma clave, el sistema devuelve el documento existente con `idempotent: true` (HTTP 200) sin consumir nueva numeracion.

        **Modos de envio**:
        - `SYNC`: envio inmediato a SIFEN. Responde con estado fiscal final.
        - `BATCH`: encola para envio por lote. HTTP 200 con `status: QUEUED_BATCH`.
        - `AUTO`: intenta SYNC y ante falla tecnica o rechazo SIFEN 1264, cae a BATCH (HTTP 202).
      security:
        - ApiConsumerKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmitirFacturaRequest"
      responses:
        "200":
          description: |
            Emitida/encolada correctamente (nueva emision), o retry idempotente recuperado.
            Cuando `idempotent: true`, el documento ya existia y no se consumio nueva numeracion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirFacturaResponse"
        "202":
          description: Documento aceptado localmente y encolado por fallback AUTO tecnico o rechazo SIFEN 1264.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirFacturaResponse"
        "401":
          description: API key ausente, invalida o consumidor inactivo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Consumidor sin permiso FACTURA_EMIT o sin alcance sobre el emisor/env solicitado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validacion de datos (incluye idempotency_key faltante o con formato invalido).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /nota-credito:
    post:
      tags: [Emision]
      summary: Emitir Nota de Crédito Electrónica
      description: |
        Crea/obtiene una NCE idempotente, genera XML v150 con `C002=5`, firma, inserta QR (AA002)
        y transmite segun `envio.mode`.

        Para referencia electronica, el CDC asociado debe existir localmente y corresponder a una FE.
        Para referencia impresa, se informan los datos del documento impreso tipo factura.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmitirNotaCreditoRequest"
      responses:
        "200":
          description: NCE emitida o encolada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirNotaCreditoResponse"
        "202":
          description: NCE aceptada localmente y encolada por fallback AUTO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirNotaCreditoResponse"
        "409":
          description: Documento ya existe o monto acumulado de NCE excede la FE asociada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura electronica referenciada no encontrada localmente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validacion de datos o referencia documental invalida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

