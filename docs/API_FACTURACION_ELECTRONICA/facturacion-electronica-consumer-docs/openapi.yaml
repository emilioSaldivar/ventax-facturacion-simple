  # ─────────────────────────────────────────────────────────
  # CONCILIACION POR IDEMPOTENCIA
  # ─────────────────────────────────────────────────────────

  /conciliacion/idempotency:
    post:
      tags: [Conciliacion]
      summary: Conciliar batch de idempotency_keys
      description: |
        Permite al consumidor recuperar el `document_uuid` de transacciones cuya respuesta se perdio.
        No ejecuta refresh SIFEN ni modifica documentos.

        **Permiso requerido**: `IDEMPOTENCY_RECONCILE`.
        **Rango maximo**: 7 dias. **Keys por request**: max 100.

        Resultados posibles por item:
        - `IMPACTED`: existe documento asociado. Incluye `document_uuid`.
        - `NOT_IMPACTED`: no existe documento en el rango consultado.
        - `DUPLICATE_CONFLICT`: multiples documentos para esa clave (requiere soporte).
        - `INVALID_KEY`: el valor no cumple el formato.
      security:
        - ApiConsumerKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconcileIdempotencyRequest"
            example:
              emisor_id: "80136968-1"
              env: "prod"
              from: "2026-06-01T00:00:00-04:00"
              to: "2026-06-07T23:59:59-04:00"
              idempotency_keys:
                - "A1B2C3D4E5"
                - "A1B2C3D4E6"
      responses:
        "200":
          description: Resultado por clave
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileIdempotencyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /conciliacion/idempotency/cancel-send:
    post:
      tags: [Conciliacion]
      summary: Cancelar envio local por idempotency_key
      description: |
        Cancela el envio local de un documento en estado `QUEUED_BATCH` identificado por `idempotency_key`,
        siempre que no exista evidencia de transmision a SIFEN (`last_sent_at IS NULL`).

        **No dispara evento fiscal SIFEN**. Solo revierte el documento a `DRAFT` localmente.
        Use este endpoint cuando la respuesta original fue incierta y el consumidor necesita
        cancelar antes de que el batch worker envie el documento.

        **Permiso requerido**: `CANCEL_SEND`.

        Resultados posibles:
        - `CANCELLED_LOCAL`: documento revertido a DRAFT.
        - `NOT_IMPACTED`: no existe documento para esa clave.
        - HTTP 409 `INVALID_DOCUMENT_STATUS`: el documento no esta en `QUEUED_BATCH`.
        - HTTP 409 `TRANSMISSION_EVIDENCE_DETECTED`: ya hay evidencia de transmision.
        - HTTP 409 `DUPLICATE_CONFLICT`: multiples documentos (requiere soporte).
      security:
        - ApiConsumerKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelSendByIdempotencyRequest"
            example:
              emisor_id: "80136968-1"
              env: "prod"
              idempotency_key: "A1B2C3D4E5"
              reason: "Consumidor cancelo la venta antes de confirmar recepcion."
      responses:
        "200":
          description: Resultado de la operacion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSendByIdempotencyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Documento ineligible (estado invalido o evidencia de transmision)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    ApiConsumerKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: |
        API key de consumidor API. Solo consumidores registrados por ADMIN_GLOBAL.
        Formato alternativo: `Authorization: Bearer <api_key>`.
        La API key global del .env queda retirada de los endpoints publicos productivos.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key global (legado, retirada de endpoints publicos productivos).
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC

  responses:
    Unauthorized:
      description: API key ausente, invalida o consumidor inactivo.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: UNAUTHORIZED
            message: API key invalida o consumidor inactivo
    Forbidden:
      description: Sin permiso funcional o sin alcance sobre el emisor/env.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: FORBIDDEN
            message: Permiso requerido - FACTURA_EMIT
    NotFound:
      description: Recurso no encontrado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: NOT_FOUND
            message: Consumidor no encontrado
    ValidationError:
      description: Payload invalido o parametros faltantes.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: VALIDATION_ERROR
            message: idempotency_key es requerido

  parameters:
    EmisorIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    DocumentStatus:
      type: string
      description: Estado interno del DE
      enum:
        - DRAFT
        - XML_GENERATED
        - XML_SIGNED
        - QR_ATTACHED
        - TRANSMISSION_FAILED
        - QUEUED_SYNC
        - SENT_SYNC
        - QUEUED_BATCH
        - SENT_BATCH
        - APPROVED
        - APPROVED_WITH_OBS
        - REJECTED
        - CANCEL_REQUESTED
        - CANCELLED
        - VOID_REQUESTED
        - VOIDED

    EmitMode:
      type: string
      enum: [SYNC, BATCH, AUTO]

    EmailDeliveryStatus:
      type: string
      description: Estado operativo de entrega de XML/KUDE al receptor. No representa aceptacion SIFEN.
      enum: [NOT_APPLICABLE, PENDING, SENT, FAILED]

    LocalArtifactStatus:
      type: object
      description: Artefactos locales generados antes o independientemente del despacho fiscal.
      properties:
        xml_unsigned:
          type: boolean
          description: Existe XML local sin firma.
        xml_signed:
          type: boolean
          description: Existe XML firmado.
        xml_qr:
          type: boolean
          description: Existe XML firmado con QR AA002.
        kude_pdf:
          type: boolean
          description: Existe KUDE PDF local.
        email_delivery:
          $ref: "#/components/schemas/EmailDeliveryStatus"
        email_sent_before_sifen_approval:
          type: boolean
          nullable: true
          description: Indica si el correo operativo fue enviado cuando el DE aun no estaba aprobado por SIFEN.

    BatchTransmissionInfo:
      type: object
      description: Datos de despacho por lote conforme MT150.
      properties:
        batch_id:
          type: string
          nullable: true
        did:
          type: string
          nullable: true
          description: "`dId` local secuencial por emisor/ambiente usado en `rEnvioLote`."
        dProtConsLote:
          type: string
          nullable: true
          description: Protocolo SIFEN retornado por `siRecepLoteDE`; debe usarse para `consultaLote`.
        dCodRes:
          type: string
          nullable: true
          description: Codigo de recepcion de lote; `0300` indica lote recibido con exito.
        dMsgRes:
          type: string
          nullable: true
          description: Mensaje de recepcion de lote.
        dTpoProces:
          type: string
          nullable: true
          description: Tiempo promedio de procesamiento informado por SIFEN para diferir polling.
        result_code:
          type: string
          nullable: true
          description: Codigo de consulta de lote; por ejemplo `0360`, `0361` o `0362`.
        result_message:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          enum: [CREATED, RECEIVED, PROCESSING, DONE, ERROR]

    CondicionOperacion:
      type: string
      enum: [CONTADO, CREDITO]

    NumberingInstruction:
      type: object
      description: Metadata opcional para clientes externos que desean delegar la numeracion al servicio.
      properties:
        mode:
          type: string
          enum: [ONLINE]
          default: ONLINE
        authority:
          type: string
          description: Autoridad esperada para determinar el numero fiscal final.
          enum: [SERVICE, CLIENT]
          default: SERVICE
        requested_document_number:
          type: string
          nullable: true
          description: Numero sugerido por el cliente; el servicio puede conservarlo solo como auditoria.

    ExternalClientReference:
      type: object
      description: Metadata opcional del sistema consumidor para trazabilidad e idempotencia.
      properties:
        source_system:
          type: string
          example: external-client
        entity_type:
          type: string
          example: sale
        entity_id:
          type: string
          example: "68"
        request_id:
          type: string
          example: mov-136
        idempotency_key:
          type: string
          example: mov-136
        operational_series:
          type: string
          nullable: true
          example: SERV
          description: Serie comercial/operativa del sistema consumidor. No se copia automaticamente a `dSerieNum`.

    ResolvedEmissionProfile:
      type: object
      nullable: true
      description: Perfil operativo/fiscal resuelto por el servicio para la emision.
      properties:
        code:
          type: string
          example: SERV
        description:
          type: string
          nullable: true
          example: Servicios
        actividadEconomicaCodigo:
          type: string
          example: "82110"
        separation_strategy:
          type: string
          enum: [SHARED_SEQUENCE, FISCAL_SERIES, SEPARATE_EXPEDITION_POINT]
          example: SHARED_SEQUENCE
        serie_operativa:
          type: string
          nullable: true
          example: SERV
        serie_fiscal:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
          example: AA
          description: Serie fiscal SIFEN `C010 dSerieNum`, si aplica.

    ResolvedTimbrado:
      type: object
      required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
      properties:
        timbrado:
          type: string
        establecimiento:
          type: string
          example: "001"
        puntoExpedicion:
          type: string
          example: "001"
        documentoNro:
          type: string
          example: "0001081"
        fecIni:
          type: string
          format: date

    EmitirFacturaRequest:
      type: object
      required:
        - emisor_id
        - actividadEconomicaCodigo
        - timbrado
        - receptor
        - fecha
        - condicionOperacion
        - items
        - envio
      properties:
        emisor_id:
          type: string
          example: "80136968-1"
          description: RUC completo del emisor configurado en FE (`emisores.ruc_completo`, formato numero-dv). No usar el ID interno numerico de la tabla `emisores`.
        actividadEconomicaCodigo:
          type: string
          example: "82110"
          description: |
            Codigo de actividad economica declarada/configurada para el emisor. Es obligatorio.
            El servicio debe validarlo contra actividades activas del emisor y contra el perfil/boca de emision.
            Este codigo no particiona por si solo la numeracion fiscal ni permite repetir numeros.
        tipoTransaccion:
          type: integer
          enum: [1, 2, 3]
          default: 1
          description: |
            Criterio de clasificacion fiscal para `iTipTra`:
            - `1`: Venta de mercaderia
            - `2`: Prestacion de servicios
            - `3`: Mixto (mercaderia + servicios)
            Si no se envia, FE aplica fallback a `1`.
        emission_profile_code:
          type: string
          nullable: true
          example: SERV
          description: |
            Codigo de perfil de emision configurado en FE. Permite resolver timbrado, punto, serie fiscal,
            numerador y estrategia de separacion. Si se omite, FE solo puede usar un perfil default no ambiguo.
        timbrado:
          type: object
          required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
          properties:
            timbrado:
              type: string
            establecimiento:
              type: string
              example: "001"
            puntoExpedicion:
              type: string
              example: "001"
            documentoNro:
              type: string
              example: "0000001"
              description: |
                Numero sugerido o referencial provisto por el cliente. En contratos con numeracion delegada,
                el servicio puede usarlo solo como referencia y asignar el numero fiscal oficial desde su propio numerador.
            fecIni:
              type: string
              format: date
        numbering:
          $ref: "#/components/schemas/NumberingInstruction"
        client_reference:
          $ref: "#/components/schemas/ExternalClientReference"
        receptor:
          type: object
          required: [docNro, razonSocial]
          properties:
            tipoDocumento:
              type: string
              description: Tipo de documento del receptor. Si se omite, se asume `CI`.
              enum: [CI, RUC, PASAPORTE, CEDULA_EXTRANJERA, CARNET_RESIDENCIA, INNOMINADO, TARJETA_DIPLOMATICA, NO_ESPECIFICADO]
              default: CI
            docNro:
              type: string
              description: Número de documento. Para `RUC` puede enviarse solo la base y complementar con `dv`, o el valor completo `base-dv`.
            dv:
              type: string
              nullable: true
              description: Dígito verificador del RUC. Usado cuando `tipoDocumento=RUC` y `docNro` no incluye guion.
            razonSocial:
              type: string
            direccion:
              type: string
              nullable: true
            telefono:
              type: string
              nullable: true
              description: |
                Telefono del receptor normalizado por FE a solo digitos.
                Se eliminan espacios y caracteres especiales.
                Si el valor normalizado supera 15 digitos, FE rechaza con `422`.
            email:
              type: string
              format: email
              nullable: true
              description: Email del cliente final. Si existe, el backend fiscal intenta enviar XML y KUDE PDF.
        fecha:
          type: string
          format: date-time
        condicionOperacion:
          type: object
          required: [tipo]
          properties:
            tipo:
              $ref: "#/components/schemas/CondicionOperacion"
            pagos:
              type: array
              description: Solo para CONTADO. Para CREDITO debe ir vacío o ausente.
              items:
                type: object
                required: [medio, monto]
                properties:
                  medio:
                    type: string
                    description: "Ej: EFECTIVO, TARJETA, TRANSFERENCIA, etc."
                  monto:
                    type: number
                    format: double
            credito:
              $ref: "#/components/schemas/CreditoOperacion"
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [codigo, descripcion, cantidad, precioUnitario, ivaTipo]
            properties:
              codigo:
                type: string
              descripcion:
                type: string
              cantidad:
                type: number
                format: double
              precioUnitario:
                type: number
                format: double
                description: Precio unitario IVA incluido (según tu modelo actual)
              ivaTipo:
                type: string
                enum: [IVA10, IVA5, EXENTO]
                description: |
                  Tipo de IVA del item segun MT v150.
                  - IVA10: gravado tasa 10%
                  - IVA5: gravado tasa 5%
                  - EXENTO: exento de IVA
        envio:
          type: object
          required: [mode]
          properties:
            mode:
              $ref: "#/components/schemas/EmitMode"
            sendNow:
              type: boolean
              default: true

    EmitirFacturaResponse:
      type: object
      required: [document_id, cdc, nro_factura, status]
      properties:
        document_id:
          type: string
        cdc:
          type: string
        nro_factura:
          type: string
          example: "001-001-0000001"
        timbrado:
          $ref: "#/components/schemas/ResolvedTimbrado"
        status:
          $ref: "#/components/schemas/DocumentStatus"
        delivery_mode:
          type: string
          nullable: true
          enum: [SYNC, BATCH, AUTO_FALLBACK_BATCH]
        email_status:
          $ref: "#/components/schemas/EmailDeliveryStatus"
          nullable: true
          description: Resultado operativo del envio de XML y KUDE PDF al cliente final; no implica aceptacion SIFEN.
        local_artifacts:
          $ref: "#/components/schemas/LocalArtifactStatus"
        batch:
          $ref: "#/components/schemas/BatchTransmissionInfo"
        number_source:
          type: string
          nullable: true
          description: Autoridad que determino el numero fiscal final del documento.
          enum: [SERVICE, CLIENT]
        emission_profile:
          $ref: "#/components/schemas/ResolvedEmissionProfile"
        xml_qr:
          type: string
          nullable: true
          description: XML final (firmado + QR AA002). Se puede omitir en prod si se usa storage externo.
        sifen:
          type: object
          nullable: true
          description: Resumen de respuesta de SIFEN si mode=SYNC
          additionalProperties: true

    CreditoOperacion:
      oneOf:
        - type: object
          required: [modalidad, plazoDias]
          properties:
            modalidad:
              type: string
              enum: [PLAZO]
            plazoDias:
              type: integer
              minimum: 1
              example: 30
        - type: object
          required: [modalidad, cantidadCuotas]
          properties:
            modalidad:
              type: string
              enum: [CUOTAS]
            cantidadCuotas:
              type: integer
              minimum: 1
              example: 2
            cuotas:
              type: array
              description: Detalle opcional para trazabilidad local y soporte de xmlgen si aplica.
              items:
                type: object
                required: [monto, vencimiento]
                properties:
                  monto:
                    type: number
                    format: double
                  vencimiento:
                    type: string
                    format: date
                  moneda:
                    type: string
                    default: PYG

    NotaCreditoReferencia:
      oneOf:
        - type: object
          required: [tipo, cdc]
          properties:
            tipo:
              type: string
              enum: [ELECTRONICO]
            cdc:
              type: string
              description: CDC de la Factura Electronica referenciada.
        - type: object
          required: [tipo, timbrado, establecimiento, puntoExpedicion, numero]
          properties:
            tipo:
              type: string
              enum: [IMPRESO]
            timbrado:
              type: string
            establecimiento:
              type: string
              example: "001"
            puntoExpedicion:
              type: string
              example: "001"
            numero:
              type: string
              example: "0000001"
            fecha:
              type: string
              format: date
              nullable: true

    EmitirNotaCreditoRequest:
      type: object
      required:
        - emisor_id
        - timbrado
        - receptor
        - fecha
        - motivo
        - referencia
        - items
        - envio
      properties:
        emisor_id:
          type: string
          example: "80136968-1"
          description: RUC completo del emisor configurado en FE (`emisores.ruc_completo`, formato numero-dv). No usar el ID interno numerico de la tabla `emisores`.
        timbrado:
          type: object
          required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
          properties:
            timbrado:
              type: string
            establecimiento:
              type: string
              example: "001"
            puntoExpedicion:
              type: string
              example: "001"
            documentoNro:
              type: string
              example: "0000001"
            fecIni:
              type: string
              format: date
        receptor:
          type: object
          required: [docNro, razonSocial]
          properties:
            tipoDocumento:
              type: string
              enum: [CI, RUC, PASAPORTE, CEDULA_EXTRANJERA, CARNET_RESIDENCIA, INNOMINADO, TARJETA_DIPLOMATICA, NO_ESPECIFICADO]
              default: CI
            docNro:
              type: string
              description: |
                Numero de documento del receptor. Para `tipoDocumento=CI` debe ser numerico.
                Para `tipoDocumento=RUC` debe informarse como `base-dv` o con `dv` separado.
                Valores genericos como `S/D` no son validos para NCE.
            dv:
              type: string
              nullable: true
            razonSocial:
              type: string
            direccion:
              type: string
              nullable: true
            telefono:
              type: string
              nullable: true
        fecha:
          type: string
          format: date-time
        motivo:
          type: object
          required: [codigo]
          properties:
            codigo:
              type: integer
              minimum: 1
              description: Codigo de motivo de emision de la NCE segun catalogo SIFEN.
        referencia:
          $ref: "#/components/schemas/NotaCreditoReferencia"
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [codigo, descripcion, cantidad, precioUnitario, ivaTipo]
            properties:
              codigo:
                type: string
              descripcion:
                type: string
              cantidad:
                type: number
                format: double
              precioUnitario:
                type: number
                format: double
              ivaTipo:
                type: string
                enum: [IVA10, IVA5, EXENTO]
                description: |
                  Tipo de IVA del item segun MT v150.
                  - IVA10: gravado tasa 10%
                  - IVA5: gravado tasa 5%
                  - EXENTO: exento de IVA
        envio:
          type: object
          required: [mode]
          properties:
            mode:
              $ref: "#/components/schemas/EmitMode"
            sendNow:
              type: boolean
              default: true

    EmitirNotaCreditoResponse:
      type: object
      required: [document_id, status, idempotent]
      properties:
        document_id:
          type: string
        cdc:
          type: string
          nullable: true
        nro_documento:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/DocumentStatus"
        idempotent:
          type: boolean
        delivery_mode:
          type: string
          nullable: true
          enum: [SYNC, BATCH, AUTO_FALLBACK_BATCH]
        sifen:
          type: object
          nullable: true
          additionalProperties: true

    CancelarRequest:
      type: object
      required: [emisor_id, cdc, motivo]
      properties:
        emisor_id:
          type: string
          example: "80136968-1"
          description: RUC completo del emisor configurado en FE (`emisores.ruc_completo`, formato numero-dv). No usar el ID interno numerico de la tabla `emisores`.
        cdc:
          type: string
        motivo:
          type: string
          maxLength: 150

    InutilizarRequest:
      type: object
      required: [emisor_id, establecimiento, puntoExpedicion, desdeNumero, hastaNumero, motivo]
      properties:
        emisor_id:
          type: string
          example: "80136968-1"
          description: RUC completo del emisor configurado en FE (`emisores.ruc_completo`, formato numero-dv). No usar el ID interno numerico de la tabla `emisores`.
        establecimiento:
          type: string
          example: "001"
        puntoExpedicion:
          type: string
          example: "001"
        desdeNumero:
          type: string
          example: "0000123"
        hastaNumero:
          type: string
          example: "0000130"
        motivo:
          type: string
          maxLength: 150

    EventoResponse:
      type: object
      required: [event_id, status]
      properties:
        event_id:
          type: string
        status:
          type: string
          example: SENT
        sifen:
          type: object
          nullable: true
          additionalProperties: true
        notification:
          type: object
          nullable: true
          properties:
            attempted:
              type: boolean
            sent:
              type: boolean
            reason:
              type: string
              nullable: true

    ComprobanteResponse:
      type: object
      required: [cdc, nro_factura, status, fecha_emision, condicion_operacion]
      properties:
        document_id:
          type: string
        cdc:
          type: string
        nro_factura:
          type: string
        status:
          $ref: "#/components/schemas/DocumentStatus"
        fecha_emision:
          type: string
          format: date-time
        condicion_operacion:
          $ref: "#/components/schemas/CondicionOperacion"
        receptor_doc:
          type: string
          nullable: true
        receptor_nombre:
          type: string
          nullable: true
        sifen_last_status:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    ComprobanteXmlResponse:
      type: object
      properties:
        xml_unsigned:
          type: string
          nullable: true
        xml_signed:
          type: string
          nullable: true
        xml_qr:
          type: string
          nullable: true

    BatchPendientesResponse:
      type: object
      required: [documents, batches]
      properties:
        documents:
          type: array
          items:
            type: object
            required: [document_id, status, tipo_documento]
            properties:
              document_id:
                type: string
              cdc:
                type: string
                nullable: true
              nro_factura:
                type: string
                nullable: true
              status:
                $ref: "#/components/schemas/DocumentStatus"
              fecha_emision:
                type: string
                nullable: true
              tipo_documento:
                type: string
        batches:
          type: array
          items:
            type: object
            required: [batch_id, did, status, doc_count, tipo_documento]
            properties:
              batch_id:
                type: string
              did:
                type: string
                description: "`dId` local secuencial por emisor/ambiente. No debe usarse como protocolo de consulta SIFEN."
              dProtConsLote:
                type: string
                nullable: true
                description: Protocolo SIFEN retornado por `siRecepLoteDE`; requerido para consultar resultado de lote.
              dCodRes:
                type: string
                nullable: true
                description: Codigo de recepcion de lote; `0300` significa recibido con exito, `0301` lote no encolado.
              dMsgRes:
                type: string
                nullable: true
                description: Mensaje de recepcion de lote.
              dTpoProces:
                type: string
                nullable: true
                description: Tiempo promedio de procesamiento informado por SIFEN.
              result_code:
                type: string
                nullable: true
                description: Codigo de consulta de lote; por ejemplo `0360`, `0361` o `0362`.
              result_message:
                type: string
                nullable: true
              status:
                type: string
                enum: [CREATED, RECEIVED, PROCESSING, DONE, ERROR]
              doc_count:
                type: integer
              tipo_documento:
                type: string
              created_at:
                type: string
                nullable: true
              updated_at:
                type: string
                nullable: true

    SifenStatusResponse:
      type: object
      required: [cdc, status]
      properties:
        cdc:
          type: string
        status:
          type: object
          additionalProperties: true
        refreshed:
          type: boolean
          default: false

    ConsultaRucNormalizedResponse:
      type: object
      required: [query, sifen, contribuyente]
      properties:
        query:
          type: object
          required: [ruc_input]
          properties:
            ruc_input:
              type: string
            ruc_consultado:
              type: string
              nullable: true
        sifen:
          type: object
          required: [success]
          properties:
            result_code:
              type: string
              nullable: true
            result_message:
              type: string
              nullable: true
            success:
              type: boolean
            raw:
              type: object
              nullable: true
              additionalProperties: true
        contribuyente:
          type: object
          properties:
            ruc:
              type: string
              nullable: true
            dv:
              type: string
              nullable: true
            ruc_completo:
              type: string
              nullable: true
            razon_social:
              type: string
