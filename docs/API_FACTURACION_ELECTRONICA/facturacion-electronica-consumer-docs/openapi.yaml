          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaResendResponse"
        "409":
          description: El cambio requiere inutilización y nuevo DE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emisores/{id}/facturas/{documentId}/create-derived:
    post:
      tags: [Admin]
      summary: Crear nuevo DE derivado con nueva numeración/CDC
      parameters:
        - in: path
          name: id
