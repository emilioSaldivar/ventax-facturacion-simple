          description: DE derivado creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaCreateDerivedResponse"

  /admin/emisores/{id}/facturas/{documentId}/decision:
    get:
      tags: [Admin]
      summary: Obtener decision operativa de autogestion por factura
      description: |
        Devuelve la decision operativa guiada del backoffice para una factura.

        Taxonomia esperada:
        - `CANCEL_SEND`: cancelacion local previa a transmision, sin evento fiscal SIFEN.
        - `CANCEL_FISCAL`: anulacion fiscal por evento cuando el DTE sigue dentro de la ventana aplicable.
        - `NCE_REQUIRED`: la anulacion fiscal ya no aplica y el sistema solo guia al usuario para emitir una Nota de Credito por flujo separado.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Decision operativa y acciones habilitadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFacturaDecisionResponse"

