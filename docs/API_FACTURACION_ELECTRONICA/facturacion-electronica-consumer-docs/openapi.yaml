      type: object
      required: [codigo, descripcion, timbrado_id, establecimiento_id, punto_expedicion_id, tipo_documento, numerador_id]
      properties:
        codigo:
          type: string
          example: SERV
          description: Codigo interno del perfil. En la UI se genera automaticamente; no es el codigo oficial de actividad economica.
        descripcion:
          type: string
        actividad_id:
          type: string
          nullable: true
