          type: string
          nullable: true
        serie_fiscal:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
          description: Obligatoria cuando `separation_strategy=FISCAL_SERIES`; debe corresponder a la serie fiscal asignada por SIFEN.
        separation_strategy:
          type: string
          enum: [SHARED_SEQUENCE, FISCAL_SERIES, SEPARATE_EXPEDITION_POINT]
          default: SHARED_SEQUENCE
          description: |
            `SHARED_SEQUENCE` comparte numeracion; sin perfiles, la emision se diferencia por `actividadEconomicaCodigo`.
            `FISCAL_SERIES` requiere `serie_fiscal`.
            `SEPARATE_EXPEDITION_POINT` requiere al menos 2 actividades activas y 2 puntos de expedicion activos.
        modo_actividad:
          type: string
          enum: [PRINCIPAL, SELECCIONADA, MULTIPLE]
          default: SELECCIONADA
        activo:
          type: boolean
          default: true
        vigente_desde:
          type: string
          format: date-time
          nullable: true
        vigente_hasta:
          type: string
          format: date-time
          nullable: true

