    # ── Contrato Canónico — TCC021/TCC022/TCC023/TCC026 ──────────────────

    ByCdcResponse:
      type: object
      description: |
        Respuesta del lookup `GET /documentos/by-cdc/{cdc}`.
        Indica si el CDC consultado es vigente o histórico y provee la identidad canónica.
      required:
        - document_uuid
        - document_id
        - requested_cdc
        - current_cdc
        - is_current
        - lineage_status
        - sifen_resolution
        - status
        - accepted_by_sifen
        - tipo_documento
        - emisor_id
        - env
        - resolution_note
      properties:
        document_uuid:
          type: string
          format: uuid
          description: Identidad canónica estable e inmutable del documento
        document_id:
          type: string
          description: ID numérico interno del documento
        requested_cdc:
          type: string
          description: CDC usado en la consulta
        current_cdc:
          type: string
          nullable: true
          description: CDC fiscal vigente del documento
        is_current:
          type: boolean
          description: true si el CDC consultado es el vigente; false si fue reemplazado
        lineage_status:
          type: string
          enum: [ACTIVE, SUPERSEDED, INCONSISTENT]
          description: Condición del CDC consultado dentro del linaje del documento
        sifen_resolution:
          type: string
          enum: [APPROVED, APPROVED_WITH_OBS, REJECTED_OR_MISSING, PENDING_CHECK]
          description: Resolución fiscal conocida del CDC consultado
        status:
          type: string
          description: Estado interno del documento
        accepted_by_sifen:
          type: boolean
          description: true si el documento está aprobado por SIFEN
        nro_factura:
          type: string
          nullable: true
        tipo_documento:
          type: string
        emisor_id:
          type: string
        env:
          type: string
          enum: [test, prod]
        resolution_note:
          type: string
          description: Texto explicativo del resultado de resolución

    DocumentoCanonicoResponse:
      type: object
      description: |
        Respuesta principal del contrato canónico (`GET /documentos/{uuid}`).
        Incluye identidad canónica, estado fiscal vigente y resumen de linaje CDC.
      required:
        - document_uuid
        - document_id
        - tipo_documento
        - establecimiento
        - punto_expedicion
        - numero
        - status
        - accepted_by_sifen
        - emisor_id
        - env
        - lineage_summary
        - created_at
        - updated_at
      properties:
        document_uuid:
          type: string
          format: uuid
          description: Identidad canónica estable e inmutable
        document_id:
          type: string
        current_cdc:
          type: string
          nullable: true
          description: CDC fiscal vigente (puede ser null si el documento aún no fue firmado)
        nro_factura:
          type: string
          nullable: true
        tipo_documento:
          type: string
        establecimiento:
          type: string
        punto_expedicion:
          type: string
        numero:
          type: string
        status:
          $ref: "#/components/schemas/DocumentStatus"
        accepted_by_sifen:
          type: boolean
        fecha_emision:
          type: string
          nullable: true
        condicion_operacion:
          type: string
          nullable: true
        emisor_id:
          type: string
        env:
          type: string
          enum: [test, prod]
        lineage_summary:
          $ref: "#/components/schemas/LineageSummary"
        sifen_last_checked_at:
          type: string
          nullable: true
        approved_at:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string

    LineageSummary:
      type: object
      description: Resumen del linaje CDC del documento
      properties:
        active_cdc:
          type: string
          nullable: true
        active_lineage_status:
          type: string
          nullable: true
          enum: [ACTIVE, SUPERSEDED, INCONSISTENT]
        active_sifen_resolution:
          type: string
          nullable: true
          enum: [APPROVED, APPROVED_WITH_OBS, REJECTED_OR_MISSING, PENDING_CHECK]
        total_cdc_entries:
          type: integer
          description: Total de entradas CDC en el linaje (incluye históricos)
        has_superseded:
          type: boolean
          description: true si el documento tuvo al menos un CDC reemplazado

    LineageEntryResponse:
      type: object
      description: Entrada individual del linaje CDC de un documento
      required:
        - id
        - cdc
        - source_type
        - lineage_status
        - sifen_resolution
        - is_active
        - created_at
      properties:
        id:
          type: string
        cdc:
          type: string
          description: CDC de 44 caracteres
        source_type:
          type: string
          enum: [INITIAL, RESEND, RETRY_SAME_CDC, DERIVED, RECONCILED, BOOTSTRAP]
          description: |
            Origen del CDC en el linaje:
            - INITIAL: primer CDC generado al emitir
            - RESEND: nuevo CDC por reenvío con cambio de XML
            - RETRY_SAME_CDC: reintento sin cambio de CDC
            - DERIVED: documento derivado de otro
            - RECONCILED: CDC promovido por reconciliación SIFEN
            - BOOTSTRAP: entrada generada por migración histórica
        lineage_status:
          type: string
          enum: [ACTIVE, SUPERSEDED, INCONSISTENT]
          description: |
            - ACTIVE: CDC vigente del documento
            - SUPERSEDED: CDC reemplazado por uno posterior
            - INCONSISTENT: no se pudo determinar el estado con evidencia suficiente
        sifen_resolution:
          type: string
          enum: [APPROVED, APPROVED_WITH_OBS, REJECTED_OR_MISSING, PENDING_CHECK]
        is_active:
          type: boolean
          description: true si es el CDC activo del documento
        sifen_code:
          type: string
          nullable: true
        sifen_message:
          type: string
          nullable: true
        revision_number:
          type: integer
          nullable: true
        approved_at:
          type: string
          nullable: true
        last_checked_at:
          type: string
          nullable: true
        created_at:
          type: string

    DocumentoLineageResponse:
      type: object
      description: Trazabilidad completa de CDC de un documento
      required:
        - document_uuid
        - document_id
        - status
        - env
        - emisor_id
        - lineage
      properties:
        document_uuid:
          type: string
          format: uuid
        document_id:
          type: string
        current_cdc:
          type: string
          nullable: true
        status:
          type: string
        env:
          type: string
          enum: [test, prod]
        emisor_id:
          type: string
        lineage:
          type: array
          items:
            $ref: "#/components/schemas/LineageEntryResponse"

    # ─── API CONSUMERS ────────────────────────────────────────

    ApiConsumerPermission:
      type: string
      enum:
        - FACTURA_EMIT
        - DOCUMENTO_READ
        - SIFEN_STATUS_READ
        - IDEMPOTENCY_RECONCILE
        - CANCEL_SEND
      description: |
        Permisos funcionales disponibles para consumidores API:
        - `FACTURA_EMIT`: emitir FE por `POST /fcws/factura`.
        - `DOCUMENTO_READ`: consultar documentos del emisor asignado.
        - `SIFEN_STATUS_READ`: consultar estado SIFEN.
        - `IDEMPOTENCY_RECONCILE`: conciliar por idempotency_key.
        - `CANCEL_SEND`: cancelar envio local previo a transmision.

    ApiConsumerEmisorAssignment:
      type: object
      required: [emisor_id, env]
      properties:
        emisor_id:
          type: string
          description: RUC completo del emisor (ej. `80136968-1`).
          example: "80136968-1"
        env:
          type: string
          enum: [test, prod]

    ApiConsumerRecord:
      type: object
      description: Consumidor API sin secretos expuestos.
      properties:
        id:
          type: string
        code:
          type: string
          example: "pos-caja-1"
        name:
          type: string
          example: "POS Caja 1"
        api_key_prefix:
          type: string
          description: Primeros 12 caracteres de la API key. Util para soporte sin exponer secreto.
          example: "R6FsM4iqG4Sv"
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        rotated_at:
          type: string
          format: date-time
          nullable: true

    ApiConsumerDetail:
      allOf:
        - $ref: "#/components/schemas/ApiConsumerRecord"
        - type: object
          properties:
            permissions:
              type: array
              items:
                $ref: "#/components/schemas/ApiConsumerPermission"
            emisor_assignments:
              type: array
              items:
                $ref: "#/components/schemas/ApiConsumerEmisorAssignment"

    ApiConsumerCreateRequest:
      type: object
      required: [code, name, permissions, emisor_assignments]
      properties:
        code:
          type: string
          pattern: "^[a-z0-9_-]+$"
          maxLength: 100
          description: Identificador estable y legible. Ej. `pos-caja-1`, `erp-cliente-a`.
          example: "pos-caja-1"
        name:
          type: string
          maxLength: 255
          example: "POS Caja 1 - Sucursal Norte"
        permissions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ApiConsumerPermission"
        emisor_assignments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ApiConsumerEmisorAssignment"

    ApiConsumerCreateResponse:
      allOf:
        - $ref: "#/components/schemas/ApiConsumerRecord"
        - type: object
          properties:
            api_key:
              type: string
              description: |
                API key completa. Solo visible en esta respuesta (creacion o rotacion).
                **Almacenar de forma segura de inmediato.** No es recuperable.
              example: "R6FsM4iqG4SvueUjMhIf..."

    ApiConsumerUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        activo:
          type: boolean
          description: Desactivar bloquea todas las operaciones del consumidor (401).

    ReplaceEmisorAssignmentsRequest:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          description: Lista completa que reemplaza las asignaciones actuales. Lista vacia revoca todo acceso.
          items:
            $ref: "#/components/schemas/ApiConsumerEmisorAssignment"

    ReplacePermissionsRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/ApiConsumerPermission"

    AuditLogItem:
      type: object
      properties:
        id:
          type: string
        actor_type:
          type: string
          enum: [API_CONSUMER, ADMIN_USER]
        action:
          type: string
          example: "FACTURA_EMIT"
        emisor_id:
          type: string
          nullable: true
        env:
          type: string
          nullable: true
        document_uuid:
          type: string
          format: uuid
          nullable: true
        document_id:
          type: string
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        success:
          type: boolean
        error_code:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    AuditLogsResponse:
      type: object
      properties:
        consumer_id:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogItem"

    # ─── CONCILIACION ─────────────────────────────────────────

    ReconcileIdempotencyRequest:
      type: object
      required: [emisor_id, env, from, to, idempotency_keys]
      properties:
        emisor_id:
          type: string
          description: RUC completo del emisor.
          example: "80136968-1"
        env:
          type: string
          enum: [test, prod]
        from:
          type: string
          format: date-time
          description: Inicio del rango (ISO 8601 con offset). Requerido.
          example: "2026-06-01T00:00:00-04:00"
        to:
          type: string
          format: date-time
          description: Fin del rango. Maximo 7 dias desde `from`.
          example: "2026-06-07T23:59:59-04:00"
        idempotency_keys:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
            pattern: "^[A-Za-z0-9_-]{8,80}$"

    ReconcileIdempotencyItem:
      type: object
      required: [idempotency_key, result]
      properties:
        idempotency_key:
          type: string
        result:
          type: string
          enum: [IMPACTED, NOT_IMPACTED, DUPLICATE_CONFLICT, INVALID_KEY]
        document_uuid:
          type: string
          format: uuid
          nullable: true
          description: Presente cuando `result=IMPACTED`.
        document_id:
          type: string
          nullable: true
        current_cdc:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        nro_factura:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          nullable: true
          description: Presente cuando `result=NOT_IMPACTED`, `DUPLICATE_CONFLICT` o `INVALID_KEY`.

    ReconcileIdempotencyResponse:
      type: object
      properties:
        consumer:
          type: object
          properties:
            id:
              type: string
            code:
              type: string
        emisor_id:
          type: string
        env:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReconcileIdempotencyItem"

    CancelSendByIdempotencyRequest:
      type: object
      required: [emisor_id, env, idempotency_key, reason]
      properties:
        emisor_id:
          type: string
          example: "80136968-1"
        env:
          type: string
          enum: [test, prod]
        idempotency_key:
          type: string
          pattern: "^[A-Za-z0-9_-]{8,80}$"
          example: "A1B2C3D4E5"
        reason:
          type: string
          maxLength: 500
          description: Motivo de la cancelacion local.
          example: "Consumidor cancelo la venta antes de confirmar recepcion."

    CancelSendByIdempotencyResponse:
      type: object
      properties:
        result:
          type: string
          enum: [CANCELLED_LOCAL, NOT_IMPACTED, DUPLICATE_CONFLICT]
        document_uuid:
          type: string
          format: uuid
          nullable: true
        document_id:
          type: string
          nullable: true
        previous_status:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
