              examples:
                generationFailed:
                  value:
                    error: raw_ticket_generation_failed
                    message: No se pudo generar el ticket crudo

# ─────────────────────────────────────────────────────────────
# Contrato Canónico — TCC022/TCC023/TCC024/TCC025/TCC026/TCC027
# Identidad principal: document_uuid (estable e inmutable)
# Reemplaza los endpoints legacy centrados en CDC.
# Ver docs/GUIA_MIGRACION_CONTRATO_CANONICO_v0.1.md para tabla de homologación.
# ─────────────────────────────────────────────────────────────

  /documentos/by-cdc/{cdc}:
    get:
      summary: Resolver CDC a documento canónico (TCC023)
      description: |
        Resuelve un CDC vigente o histórico al documento canónico correspondiente.
        Indica si el CDC consultado es el vigente (`is_current=true`) o fue reemplazado.

        **Uso operativo:** usar este endpoint cuando el sistema cliente almacenó un CDC
        y necesita obtener el `document_uuid` canónico para migrar sus referencias.
        No usar este endpoint como identidad primaria — usar `/documentos/{uuid}` en su lugar.

        **Homólogo legacy:** `GET /consultar/comprobante/{cdc}`
      tags: [Contrato Canónico]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: cdc
          in: path
          required: true
          schema:
            type: string
            minLength: 44
            maxLength: 44
          description: CDC de 44 caracteres (vigente o histórico)
        - name: env
          in: query
          required: false
          schema:
