            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [CANCEL, VOID_RANGE]
                status:
                  type: string
                limit:
                  type: integer
                  default: 50
                  maximum: 50
      responses:
        "200":
          description: Resultado del refresh masivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventosRefreshMasivoResult"
        "401":
          description: No autenticado
        "403":
          description: Sin acceso al emisor
        "404":
          description: Emisor no encontrado

  /admin/emisores/{id}/eventos/{eventId}:
    get:
      tags: [Admin]
      summary: Detalle técnico de un evento fiscal
      description: Expone metadata, payload enviado (sanitizado) y respuesta SIFEN.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detalle del evento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventoAdminDetail"
        "401":
          description: No autenticado
        "403":
          description: Sin acceso al emisor
        "404":
          description: Evento no encontrado

  /admin/emisores/{id}/eventos/{eventId}/refresh:
    post:
      tags: [Admin]
      summary: Refresh puntual de un evento
      description: |
        Para eventos CANCEL con CDC: consulta SIFEN vía consultCdc para inferir el estado actual.
        Para VOID_RANGE: actualiza last_refreshed_at sin consulta SIFEN (sin endpoint disponible).
        Eventos ACCEPTED refrescados hace menos de 1h son omitidos (cooldown).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resultado del refresh puntual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventoRefreshResult"
        "401":
          description: No autenticado
        "403":
          description: Sin acceso al emisor
        "404":
          description: Evento no encontrado

