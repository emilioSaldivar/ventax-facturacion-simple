      responses:
        "200":
          description: XMLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprobanteXmlResponse"
        "404":
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consultar/comprobanteSifen/{cdc}:
    get:
      tags: [Consultas]
      summary: Consultar estado en SIFEN por CDC
      description: |
        Si refresh=true, consulta en SIFEN y actualiza cache.
        Si refresh=false, devuelve el cache persistido.
      parameters:
        - in: path
          name: cdc
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento y destino de la consulta remota a SIFEN.
        - in: query
          name: refresh
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Estado SIFEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SifenStatusResponse"
        "404":
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consultar/{id}/facturalista/{numero}:
    get:
      tags: [Consultas]
      summary: Listar facturas (compatibilidad DocuJSON)
      description: |
        Mantiene el path esperado: /consultar/{id}/facturalista/{numero}
        Interpretación MVP:
        - {id} = emisor_id o tenant_id (definir en implementación, por defecto emisor_id)
        - {numero} = cursor/offset (int)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: numero
          required: true
          schema:
            type: integer
        - in: query
          name: env
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento cuando la base aloja mas de un ambiente.
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/DocumentStatus"
        - in: query
          name: q
          schema:
            type: string
      responses:
        "200":
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListaFacturasResponse"

  /consultar/evento/{cdc}:
    get:
      tags: [Consultas]
      summary: Consultar eventos por CDC
      parameters:
        - in: path
          name: cdc
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del evento cuando la base aloja mas de un ambiente.
      responses:
        "200":
          description: Eventos asociados al CDC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventosResponse"
        "404":
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consultar/{id}/batch-pendientes:
    get:
      tags: [Consultas]
      summary: Consultar cola y lotes pendientes por emisor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          schema:
            type: string
            enum: [test, prod]
        - in: query
          name: tipoDocumento
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Cola y lotes pendientes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPendientesResponse"
        "422":
          description: Validación de datos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /files/xml/{cdc}:
    get:
      tags: [Archivos]
      summary: Descargar XML final por CDC
      description: |
        Descarga el XML local del Documento Electronico.
        Usa `xml_qr` como fuente primaria y `xml_signed` como fallback.
      parameters:
        - in: path
          name: cdc
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento cuando la base aloja mas de un ambiente.
      responses:
        "200":
          description: XML descargable
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Attachment con nombre `<cdc>.xml`.
          content:
            application/xml:
              schema:
                type: string
        "404":
          description: No existe XML local asociado al CDC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: xml_not_found
        "500":
          description: Fallo al descargar XML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                generationFailed:
                  value:
                    error: xml_download_failed

  /files/kude/{cdc}.pdf:
    get:
      tags: [Archivos]
      summary: Descargar PDF KUDE por CDC
      description: |
        Genera y descarga un PDF KUDE desde el XML local del Documento Electronico.
        Usa `facturacionelectronicapy-kude` y requiere Java disponible en runtime.
        En instancias multi-facturador, usa el logo configurado en el emisor propietario del documento
        (`emisores.logo_path`). Si el emisor no tiene logo configurado, el KUDE se genera sin imagen de logo.
      parameters:
        - in: path
          name: cdc
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento cuando la base aloja mas de un ambiente.
      responses:
        "200":
          description: PDF KUDE descargable
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Attachment con nombre `<cdc>.pdf`.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: No existe XML local asociado al CDC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: kude_xml_not_found
        "500":
          description: Fallo al generar KUDE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                generationFailed:
                  value:
                    error: kude_generation_failed

  /files/ticket/{cdc}/raw:
    get:
      tags: [Archivos]
      summary: Obtener ticket térmico crudo por CDC
      description: |
        Genera una salida de ticket térmico a partir del XML local del Documento Electrónico.

        Modos soportados:
        - sin `format`: devuelve ticket en `text/plain`
        - con `format=escpos`: devuelve payload binario `ESC/POS` listo para impresora térmica
      parameters:
        - in: path
          name: cdc
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
          description: Ambiente persistido del documento cuando la base aloja mas de un ambiente.
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [escpos]
          description: Si vale `escpos`, retorna `application/octet-stream`. Si se omite, retorna `text/plain`.
      responses:
        "200":
          description: Ticket generado correctamente
          content:
            text/plain:
              schema:
                type: string
              examples:
                rawTicket:
                  summary: Ticket texto plano
                  value: |
                    80136968-1
                    AWAPURA E.A.S. UNIPERSONAL
                    3 de febrero
                    VILLA ELISA
                    Tel: 0981296077
                    ------------------------------------------------
                    Timbrado:         80136968
                    Documento:        Factura electronica
                    Numero:           001-001-0000953
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: No existe XML local asociado al CDC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: raw_ticket_not_found
                    message: Ticket crudo no encontrado
        "500":
          description: Fallo al transformar el XML a ticket térmico
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                generationFailed:
                  value:
                    error: raw_ticket_generation_failed
                    message: No se pudo generar el ticket crudo

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC

  parameters:
    EmisorIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    DocumentStatus:
      type: string
      description: Estado interno del DE
      enum:
        - DRAFT
        - XML_GENERATED
        - XML_SIGNED
        - QR_ATTACHED
        - TRANSMISSION_FAILED
        - QUEUED_SYNC
        - SENT_SYNC
        - QUEUED_BATCH
        - SENT_BATCH
        - APPROVED
        - APPROVED_WITH_OBS
        - REJECTED
        - CANCEL_REQUESTED
        - CANCELLED
        - VOID_REQUESTED
        - VOIDED

    EmitMode:
      type: string
      enum: [SYNC, BATCH, AUTO]

    EmailDeliveryStatus:
      type: string
      description: Estado operativo de entrega de XML/KUDE al receptor. No representa aceptacion SIFEN.
      enum: [NOT_APPLICABLE, PENDING, SENT, FAILED]

    LocalArtifactStatus:
      type: object
      description: Artefactos locales generados antes o independientemente del despacho fiscal.
      properties:
        xml_unsigned:
          type: boolean
          description: Existe XML local sin firma.
        xml_signed:
          type: boolean
          description: Existe XML firmado.
        xml_qr:
          type: boolean
          description: Existe XML firmado con QR AA002.
        kude_pdf:
          type: boolean
          description: Existe KUDE PDF local.
        email_delivery:
          $ref: "#/components/schemas/EmailDeliveryStatus"
        email_sent_before_sifen_approval:
          type: boolean
          nullable: true
          description: Indica si el correo operativo fue enviado cuando el DE aun no estaba aprobado por SIFEN.

    BatchTransmissionInfo:
      type: object
      description: Datos de despacho por lote conforme MT150.
      properties:
        batch_id:
          type: string
          nullable: true
        did:
          type: string
          nullable: true
          description: "`dId` local secuencial por emisor/ambiente usado en `rEnvioLote`."
        dProtConsLote:
          type: string
          nullable: true
          description: Protocolo SIFEN retornado por `siRecepLoteDE`; debe usarse para `consultaLote`.
        dCodRes:
          type: string
          nullable: true
          description: Codigo de recepcion de lote; `0300` indica lote recibido con exito.
        dMsgRes:
          type: string
          nullable: true
          description: Mensaje de recepcion de lote.
        dTpoProces:
          type: string
          nullable: true
          description: Tiempo promedio de procesamiento informado por SIFEN para diferir polling.
        result_code:
          type: string
          nullable: true
          description: Codigo de consulta de lote; por ejemplo `0360`, `0361` o `0362`.
        result_message:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          enum: [CREATED, RECEIVED, PROCESSING, DONE, ERROR]

    CondicionOperacion:
      type: string
      enum: [CONTADO, CREDITO]

    NumberingInstruction:
      type: object
      description: Metadata opcional para clientes externos que desean delegar la numeracion al servicio.
      properties:
        mode:
          type: string
          enum: [ONLINE]
          default: ONLINE
        authority:
          type: string
          description: Autoridad esperada para determinar el numero fiscal final.
          enum: [SERVICE, CLIENT]
          default: SERVICE
        requested_document_number:
          type: string
          nullable: true
          description: Numero sugerido por el cliente; el servicio puede conservarlo solo como auditoria.

    ExternalClientReference:
      type: object
      description: Metadata opcional del sistema consumidor para trazabilidad e idempotencia.
      properties:
        source_system:
          type: string
          example: external-client
        entity_type:
          type: string
          example: sale
        entity_id:
          type: string
          example: "68"
        request_id:
          type: string
          example: mov-136
        idempotency_key:
          type: string
          example: mov-136
        operational_series:
          type: string
          nullable: true
          example: SERV
          description: Serie comercial/operativa del sistema consumidor. No se copia automaticamente a `dSerieNum`.

    ResolvedEmissionProfile:
      type: object
      nullable: true
      description: Perfil operativo/fiscal resuelto por el servicio para la emision.
      properties:
        code:
          type: string
          example: SERV
        description:
          type: string
          nullable: true
          example: Servicios
        actividadEconomicaCodigo:
          type: string
          example: "82110"
        separation_strategy:
          type: string
          enum: [SHARED_SEQUENCE, FISCAL_SERIES, SEPARATE_EXPEDITION_POINT]
          example: SHARED_SEQUENCE
        serie_operativa:
          type: string
          nullable: true
          example: SERV
        serie_fiscal:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
          example: AA
          description: Serie fiscal SIFEN `C010 dSerieNum`, si aplica.

    ResolvedTimbrado:
      type: object
      required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
      properties:
        timbrado:
          type: string
        establecimiento:
          type: string
          example: "001"
        puntoExpedicion:
          type: string
          example: "001"
        documentoNro:
          type: string
          example: "0001081"
        fecIni:
          type: string
          format: date

    EmitirFacturaRequest:
      type: object
      required:
        - emisor_id
        - actividadEconomicaCodigo
        - timbrado
        - receptor
        - fecha
        - condicionOperacion
        - items
        - envio
      properties:
        emisor_id:
          type: string
          example: "80136968-1"
          description: RUC completo del emisor configurado en FE (`emisores.ruc_completo`, formato numero-dv). No usar el ID interno numerico de la tabla `emisores`.
        actividadEconomicaCodigo:
          type: string
          example: "82110"
          description: |
            Codigo de actividad economica declarada/configurada para el emisor. Es obligatorio.
            El servicio debe validarlo contra actividades activas del emisor y contra el perfil/boca de emision.
            Este codigo no particiona por si solo la numeracion fiscal ni permite repetir numeros.
        tipoTransaccion:
          type: integer
          enum: [1, 2, 3]
          default: 1
          description: |
            Criterio de clasificacion fiscal para `iTipTra`:
            - `1`: Venta de mercaderia
            - `2`: Prestacion de servicios
            - `3`: Mixto (mercaderia + servicios)
            Si no se envia, FE aplica fallback a `1`.
        emission_profile_code:
          type: string
          nullable: true
          example: SERV
          description: |
            Codigo de perfil de emision configurado en FE. Permite resolver timbrado, punto, serie fiscal,
            numerador y estrategia de separacion. Si se omite, FE solo puede usar un perfil default no ambiguo.
        timbrado:
          type: object
          required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
          properties:
            timbrado:
              type: string
            establecimiento:
              type: string
              example: "001"
            puntoExpedicion:
              type: string
              example: "001"
            documentoNro:
              type: string
              example: "0000001"
              description: |
                Numero sugerido o referencial provisto por el cliente. En contratos con numeracion delegada,
                el servicio puede usarlo solo como referencia y asignar el numero fiscal oficial desde su propio numerador.
            fecIni:
              type: string
              format: date
        numbering:
          $ref: "#/components/schemas/NumberingInstruction"
        client_reference:
          $ref: "#/components/schemas/ExternalClientReference"
        receptor:
          type: object
          required: [docNro, razonSocial]
          properties:
            tipoDocumento:
              type: string
              description: Tipo de documento del receptor. Si se omite, se asume `CI`.
              enum: [CI, RUC, PASAPORTE, CEDULA_EXTRANJERA, CARNET_RESIDENCIA, INNOMINADO, TARJETA_DIPLOMATICA, NO_ESPECIFICADO]
              default: CI
            docNro:
              type: string
              description: Número de documento. Para `RUC` puede enviarse solo la base y complementar con `dv`, o el valor completo `base-dv`.
            dv:
              type: string
              nullable: true
              description: Dígito verificador del RUC. Usado cuando `tipoDocumento=RUC` y `docNro` no incluye guion.
            razonSocial:
              type: string
            direccion:
              type: string
              nullable: true
            telefono:
              type: string
              nullable: true
              description: |
                Telefono del receptor normalizado por FE a solo digitos.
                Se eliminan espacios y caracteres especiales.
                Si el valor normalizado supera 15 digitos, FE rechaza con `422`.
            email:
              type: string
              format: email
              nullable: true
              description: Email del cliente final. Si existe, el backend fiscal intenta enviar XML y KUDE PDF.
        fecha:
          type: string
          format: date-time
        condicionOperacion:
          type: object
          required: [tipo]
          properties:
            tipo:
              $ref: "#/components/schemas/CondicionOperacion"
            pagos:
              type: array
              description: Solo para CONTADO. Para CREDITO debe ir vacío o ausente.
              items:
                type: object
                required: [medio, monto]
                properties:
                  medio:
                    type: string
                    description: "Ej: EFECTIVO, TARJETA, TRANSFERENCIA, etc."
                  monto:
                    type: number
                    format: double
            credito:
              $ref: "#/components/schemas/CreditoOperacion"
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [codigo, descripcion, cantidad, precioUnitario, ivaTipo]
            properties:
              codigo:
                type: string
              descripcion:
                type: string
              cantidad:
                type: number
                format: double
              precioUnitario:
                type: number
                format: double
                description: Precio unitario IVA incluido (según tu modelo actual)
              ivaTipo:
                type: string
                description: "Ej: IVA10, IVA5, EXENTO (mapear a MT v150 internamente)"
        envio:
          type: object
          required: [mode]
          properties:
            mode:
              $ref: "#/components/schemas/EmitMode"
            sendNow:
              type: boolean
              default: true

    EmitirFacturaResponse:
      type: object
      required: [document_id, cdc, nro_factura, status]
      properties:
        document_id:
          type: string
        cdc:
          type: string
        nro_factura:
          type: string
          example: "001-001-0000001"
        timbrado:
          $ref: "#/components/schemas/ResolvedTimbrado"
        status:
          $ref: "#/components/schemas/DocumentStatus"
        delivery_mode:
          type: string
          nullable: true
          enum: [SYNC, BATCH, AUTO_FALLBACK_BATCH]
        email_status:
          $ref: "#/components/schemas/EmailDeliveryStatus"
          nullable: true
          description: Resultado operativo del envio de XML y KUDE PDF al cliente final; no implica aceptacion SIFEN.
        local_artifacts:
          $ref: "#/components/schemas/LocalArtifactStatus"
        batch:
          $ref: "#/components/schemas/BatchTransmissionInfo"
        number_source:
          type: string
          nullable: true
          description: Autoridad que determino el numero fiscal final del documento.
          enum: [SERVICE, CLIENT]
        emission_profile:
          $ref: "#/components/schemas/ResolvedEmissionProfile"
        xml_qr:
          type: string
          nullable: true
          description: XML final (firmado + QR AA002). Se puede omitir en prod si se usa storage externo.
        sifen:
          type: object
          nullable: true
          description: Resumen de respuesta de SIFEN si mode=SYNC
          additionalProperties: true

    CreditoOperacion:
      oneOf:
        - type: object
          required: [modalidad, plazoDias]
          properties:
            modalidad:
              type: string
              enum: [PLAZO]
            plazoDias:
              type: integer
              minimum: 1
              example: 30
        - type: object
          required: [modalidad, cantidadCuotas]
          properties:
            modalidad:
              type: string
              enum: [CUOTAS]
            cantidadCuotas:
              type: integer
              minimum: 1
              example: 2
            cuotas:
              type: array
              description: Detalle opcional para trazabilidad local y soporte de xmlgen si aplica.
              items:
                type: object
                required: [monto, vencimiento]
                properties:
                  monto:
                    type: number
                    format: double
                  vencimiento:
                    type: string
                    format: date
                  moneda:
                    type: string
                    default: PYG

    NotaCreditoReferencia:
      oneOf:
        - type: object
          required: [tipo, cdc]
          properties:
            tipo:
              type: string
              enum: [ELECTRONICO]
            cdc:
              type: string
              description: CDC de la Factura Electronica referenciada.
        - type: object
          required: [tipo, timbrado, establecimiento, puntoExpedicion, numero]
          properties:
            tipo:
              type: string
              enum: [IMPRESO]
            timbrado:
              type: string
            establecimiento:
              type: string
              example: "001"
            puntoExpedicion:
              type: string
              example: "001"
            numero:
              type: string
              example: "0000001"
            fecha:
              type: string
              format: date
              nullable: true

    EmitirNotaCreditoRequest:
      type: object
      required:
        - emisor_id
        - timbrado
        - receptor
        - fecha
        - motivo
        - referencia
        - items
        - envio
      properties:
        emisor_id:
          type: string
          example: "80136968-1"
          description: RUC completo del emisor configurado en FE (`emisores.ruc_completo`, formato numero-dv). No usar el ID interno numerico de la tabla `emisores`.
        timbrado:
          type: object
          required: [timbrado, establecimiento, puntoExpedicion, documentoNro, fecIni]
          properties:
            timbrado:
              type: string
            establecimiento:
              type: string
              example: "001"
            puntoExpedicion:
              type: string
              example: "001"
            documentoNro:
              type: string
              example: "0000001"
            fecIni:
              type: string
              format: date
        receptor:
          type: object
          required: [docNro, razonSocial]
          properties:
            tipoDocumento:
              type: string
              enum: [CI, RUC, PASAPORTE, CEDULA_EXTRANJERA, CARNET_RESIDENCIA, INNOMINADO, TARJETA_DIPLOMATICA, NO_ESPECIFICADO]
              default: CI
            docNro:
              type: string
              description: |
                Numero de documento del receptor. Para `tipoDocumento=CI` debe ser numerico.
                Para `tipoDocumento=RUC` debe informarse como `base-dv` o con `dv` separado.
                Valores genericos como `S/D` no son validos para NCE.
            dv:
              type: string
              nullable: true
            razonSocial:
              type: string
            direccion:
