      summary: Consultar estado de facturas por facturador
      description: |
        Devuelve una bandeja operativa con resumen por estado interno y estado SIFEN cacheado.
        Pensado para frontend administrativo por facturador/emisor.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [test, prod]
        - in: query
          name: establecimiento
          required: false
          schema:
            type: string
        - in: query
          name: punto
          required: false
          schema:
            type: string
        - in: query
          name: tipoDocumento
          required: false
          schema:
            type: string
            enum: [FE, NCE]
          description: Filtra por tipo de documento electronico.
        - in: query
          name: condicionOperacion
          required: false
          schema:
            type: string
            enum: [CONTADO, CREDITO]
          description: Filtra por condicion de operacion del documento.
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/DocumentStatus"
        - in: query
          name: sifenStatus
          required: false
          schema:
            type: string
        - in: query
          name: freshness
          required: false
          schema:
            type: string
            enum: [fresh, stale, missing]
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
          description: Fecha de emision desde.
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
          description: Fecha de emision hasta.
        - in: query
          name: sentFrom
          required: false
          schema:
            type: string
            format: date
          description: Fecha de envio/transmision a SIFEN desde.
        - in: query
          name: sentTo
          required: false
          schema:
            type: string
            format: date
          description: Fecha de envio/transmision a SIFEN hasta.
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Bandeja operativa del facturador
          content:
            application/json:
              schema:
