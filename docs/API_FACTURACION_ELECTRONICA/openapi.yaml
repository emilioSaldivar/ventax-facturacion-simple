  /factura:
    post:
      tags: [Emision]
      summary: Emitir Factura Electrónica (CONTADO o CREDITO)
      description: |
        Crea/obtiene un DE idempotente, genera XML v150, firma, inserta QR (AA002).
        El servicio genera y conserva artefactos locales (XML firmado, XML con QR, KUDE y estado de correo)
        aunque el despacho fiscal por lote quede pendiente o no llegue a enviarse en ese momento.
        Si envio.mode=SYNC: intenta enviar inmediatamente a SIFEN.
        Si envio.mode=BATCH: encola para envío por lote.
        Si envio.mode=AUTO: intenta SYNC y ante falla técnica, o rechazo SIFEN 1264 por servicio síncrono no habilitado, pasa a cola BATCH.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmitirFacturaRequest"
      responses:
        "200":
          description: Emitida (o encolada) correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirFacturaResponse"
        "202":
          description: Documento aceptado localmente y encolado por fallback AUTO técnico o por rechazo SIFEN 1264 del servicio síncrono.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirFacturaResponse"
        "409":
          description: Documento ya existe (idempotencia)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validación de datos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /nota-credito:
    post:
      tags: [Emision]
      summary: Emitir Nota de Crédito Electrónica
      description: |
        Crea/obtiene una NCE idempotente, genera XML v150 con `C002=5`, firma, inserta QR (AA002)
        y transmite segun `envio.mode`.

        Para referencia electronica, el CDC asociado debe existir localmente y corresponder a una FE.
        Para referencia impresa, se informan los datos del documento impreso tipo factura.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmitirNotaCreditoRequest"
      responses:
        "200":
          description: NCE emitida o encolada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirNotaCreditoResponse"
        "202":
          description: NCE aceptada localmente y encolada por fallback AUTO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmitirNotaCreditoResponse"
        "409":
          description: Documento ya existe o monto acumulado de NCE excede la FE asociada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura electronica referenciada no encontrada localmente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validacion de datos o referencia documental invalida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dev/smoke/emit-fe:
    post:
      tags: [Emision]
      summary: Smoke test de emisión FE SYNC (solo desarrollo)
      description: |
        Ejecuta el pipeline real xmlgen -> xmlsign -> qrgen -> setapi.recibe usando fixture interno.
        Requiere API key y APP_ENV=dev.
      responses:
        "200":
          description: Emisión smoke completada
          content:
            application/json:
              schema:
                type: object
                required: [correlation_id, status]
                properties:
                  cdc:
                    type: string
                    nullable: true
                  correlation_id:
                    type: string
                  status:
                    type: object
                    additionalProperties: true
                  xml_final:
                    type: string
                    nullable: true
        "401":
          description: API key inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Endpoint no permitido fuera de dev
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error al ejecutar smoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

